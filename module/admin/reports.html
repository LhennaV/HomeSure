<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="../../assets/img/image.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeSure – Reports</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../assets/css/admin/admin-reports.css" />
</head>
<body>
<div class="layout">
  <div id="hs-sidebar"></div>
  <div class="main">
    <div id="hs-topbar"></div>
    <div class="content">

      <div class="page-header">
        <div>
          <h1 class="page-title">Reports</h1>
          <p class="page-sub">User-submitted reports on listings and sellers</p>
        </div>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <div class="filter-tabs" id="filterTabs">
          <button class="filter-tab active" data-status="all">All</button>
          <button class="filter-tab" data-status="pending">Pending</button>
          <button class="filter-tab" data-status="under_review">Under Review</button>
          <button class="filter-tab" data-status="resolved">Resolved</button>
          <button class="filter-tab" data-status="rejected">Rejected</button>
        </div>
        <div class="filter-search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="filter-search" id="reportSearch" placeholder="Search reports..." oninput="renderReports()" />
        </div>
      </div>

      <!-- Reports Table -->
      <div class="table-card" id="reportsContainer"></div>

    </div>
  </div>
</div>

<!-- Report Detail Modal -->
<div class="modal-backdrop" id="reportModal">
  <div class="modal" id="reportModalContent"></div>
</div>

<script src="../../assets/js/fake-data.js"></script>
<script src="../../components/sidebar.js"></script>
<script src="../../components/topbar.js"></script>
<script src="../../assets/js/admin/admin-reports.js"></script>
</body>
</html>
