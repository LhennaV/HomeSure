<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="../../assets/img/image.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeSure – Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../assets/css/admin/admin-dashboard.css" />
</head>
<body>
<div class="layout">
  <div id="hs-sidebar"></div>
  <div class="main">
    <div id="hs-topbar"></div>
    <div class="content">

      <!-- Page Header -->
      <div class="page-header">
        <div>
          <h1 class="page-title" id="dashTitle">Admin Dashboard</h1>
          <p class="page-sub">Platform overview and management</p>
        </div>
      </div>

      <!-- Stat Cards -->
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-icon teal">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </div>
          <div class="stat-body">
            <div class="stat-label">Total Listings</div>
            <div class="stat-value" id="totalListings">0</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <div class="stat-body">
            <div class="stat-label">Active Users</div>
            <div class="stat-value" id="totalUsers">0</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <div class="stat-body">
            <div class="stat-label">Verified Sellers</div>
            <div class="stat-value" id="verifiedSellers">0</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon amber">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <div class="stat-body">
            <div class="stat-label">Pending Verifications</div>
            <div class="stat-value" id="pendingSellers">0</div>
          </div>
        </div>
      </div>

      <!-- Main Grid -->
      <div class="dash-grid">

        <!-- Recent Listings -->
        <div class="dash-card">
          <div class="dash-card-header">
            <span class="dash-card-title">Recent Listings</span>
            <a class="dash-card-link" href="#">View All</a>
          </div>
          <div class="listing-list" id="recentListings"></div>
        </div>

        <!-- Pending Actions -->
        <div class="dash-card">
          <div class="dash-card-header">
            <span class="dash-card-title">Pending Actions</span>
          </div>
          <div class="action-list" id="pendingActions"></div>
        </div>

      </div>

      <!-- Bottom Grid -->
      <div class="dash-grid">

        <!-- Recent Sellers -->
        <div class="dash-card">
          <div class="dash-card-header">
            <span class="dash-card-title">Seller Registrations</span>
            <a class="dash-card-link" href="#">View All</a>
          </div>
          <div class="seller-list" id="recentSellers"></div>
        </div>

        <!-- Platform Stats -->
        <div class="dash-card">
          <div class="dash-card-header">
            <span class="dash-card-title">Listing Breakdown</span>
          </div>
          <div class="breakdown-list" id="listingBreakdown"></div>
        </div>

      </div>

    </div>
  </div>
</div>

<script src="../../assets/js/fake-data.js"></script>
<script src="../../components/sidebar.js"></script>
<script src="../../components/topbar.js"></script>
<script src="../../assets/js/admin/admin-dashboard.js"></script>
</body>
</html>
