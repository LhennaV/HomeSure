<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeSure – Seller Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1E293B; --card: #253347; --border: rgba(255,255,255,0.07);
      --teal: #00c9a7; --teal-faint: rgba(0,201,167,0.12);
      --text: #f1f5f9; --muted: rgba(255,255,255,0.4); --muted2: rgba(255,255,255,0.65);
      --radius: 12px;
    }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
    .layout { display: flex; height: 100vh; }
    .main   { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .content { flex: 1; overflow-y: auto; padding: 22px 26px 40px; }
    .content::-webkit-scrollbar { width: 5px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #1fc8b4, #0a5e53); border-radius: 99px; }
    .content::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #24e0ca, #1a9e8f); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Back link ── */
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--muted2); font-size: 13px; font-weight: 500;
      cursor: pointer; border: none; background: none;
      font-family: inherit; padding: 0; margin-bottom: 18px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--teal); }
    .back-link svg { width: 16px; height: 16px; }

    /* ── Profile card ── */
    .profile-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px 24px;
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 28px;
      animation: fadeUp 0.4s ease both;
    }

    .profile-avatar {
      width: 68px; height: 68px; border-radius: 50%;
      background: linear-gradient(135deg, #0F766E, #00c9a7);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 800; color: #fff;
      flex-shrink: 0; letter-spacing: -0.02em;
    }

    .profile-info { flex: 1; min-width: 0; }

    .profile-name-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 5px; flex-wrap: wrap;
    }
    .profile-name { font-size: 20px; font-weight: 800; color: var(--text); }
    .profile-verified-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--teal-faint); color: var(--teal);
      font-size: 11px; font-weight: 700;
      padding: 3px 9px; border-radius: 20px;
    }
    .profile-verified-badge svg { width: 11px; height: 11px; }

    .profile-seller-tag {
      display: flex; align-items: center; gap: 6px;
      font-size: 12.5px; color: var(--teal); font-weight: 600;
      margin-bottom: 10px;
    }
    .profile-seller-tag svg { width: 14px; height: 14px; }

    .profile-stats {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
    }
    .profile-stats-dot { color: var(--muted); }
    .profile-stats strong { color: var(--muted2); font-weight: 600; }

    /* ── Listings section ── */
    .listings-section { animation: fadeUp 0.4s ease 0.08s both; }
    .listings-section-title { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
    .listings-section-sub   { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

    /* ── Property Grid (reuse buyer card style) ── */
    .listings-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .prop-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; cursor: pointer;
      animation: fadeUp 0.4s ease both;
      transition: transform 0.18s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .prop-card:hover {
      transform: translateY(-4px);
      border-color: rgba(0,201,167,0.35);
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }
    .prop-img-wrap { position: relative; height: 155px; overflow: hidden; }
    .prop-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.35s ease;
    }
    .prop-card:hover .prop-img-wrap img { transform: scale(1.06); }
    .prop-img-wrap::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.38) 100%);
      pointer-events: none;
    }
    .badge-tl {
      position: absolute; top: 10px; left: 10px; z-index: 1;
      padding: 3px 9px; border-radius: 20px;
      font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
    }
    .badge-rent { background: #00c9a7; color: #06201a; }
    .badge-sale { background: #3b82f6; color: #051226; }
    .badge-tr {
      position: absolute; top: 10px; right: 10px; z-index: 1;
      padding: 3px 9px; border-radius: 20px;
      font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em;
      background: rgba(0,0,0,0.5); color: #e2e8f0; backdrop-filter: blur(4px);
    }
    .verified-check {
      display: inline-flex; align-items: center; justify-content: center;
      width: 15px; height: 15px; border-radius: 50%;
      background: #00c9a7; flex-shrink: 0; vertical-align: middle;
      margin-left: 5px; position: relative; top: -1px;
    }
    .verified-check svg { width: 9px; height: 9px; color: #fff; display: block; }
    .prop-body { padding: 13px 14px 14px; }
    .prop-title {
      font-size: 13px; font-weight: 700; color: var(--text);
      margin-bottom: 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .prop-address {
      font-size: 11px; color: var(--muted);
      display: flex; align-items: flex-start; gap: 4px;
      margin-bottom: 11px; overflow: hidden;
      white-space: nowrap; text-overflow: ellipsis;
    }
    .prop-address svg { width: 11px; height: 11px; flex-shrink: 0; margin-top: 1px; }
    .prop-amenities { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .amenity {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--muted2);
    }
    .amenity svg { width: 12px; height: 12px; color: var(--muted); }
    .prop-footer { display: flex; align-items: flex-end; justify-content: space-between; }
    .prop-price { font-size: 15px; font-weight: 800; color: var(--text); line-height: 1.2; }
    .prop-price-per { font-size: 10.5px; color: var(--muted); font-weight: 400; }
    .badge-negotiable {
      padding: 2px 8px; border-radius: 20px;
      background: var(--teal-faint); color: var(--teal);
      font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .empty-state {
      grid-column: 1/-1; text-align: center;
      padding: 60px 32px; color: var(--muted); font-size: 14px;
    }

    /* ── Light mode ── */
    [data-theme="light"] {
      --bg: #f1f5f9; --card: #ffffff; --border: rgba(0,0,0,0.09);
      --text: #1e293b; --muted: rgba(0,0,0,0.45); --muted2: rgba(0,0,0,0.6);
    }
    [data-theme="light"] body { background: var(--bg); color: var(--text); }
  </style>
</head>
<body>
<div class="layout">
  <div id="hs-sidebar"></div>
  <div class="main">
    <div id="hs-topbar"></div>
    <div class="content">

      <button class="back-link" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>

      <div id="profileContent"></div>

    </div>
  </div>
</div>

<script src="../../assets/js/fake-data.js"></script>
<script src="../../components/sidebar.js"></script>
<script src="../../components/topbar.js"></script>
<script>
  const user = getSession();
  if (!user || user.role !== 'buyer') window.location.href = '../../auth/signin.html';

  HomeSureSidebar.init({ activePage: 'dashboard' });
  HomeSureTopbar.init({ placeholder: 'Search properties...' });

  // ── Icons ──────────────────────────────────────────────────────────────────
  const iconCheck = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  const iconPin   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
  const iconBed   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/></svg>`;
  const iconBath  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6 6.5 3.5a1.5 1.5 0 0 0-1-.5C4.683 3 4 3.683 4 4.5V17a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5"/><line x1="10" y1="5" x2="8" y2="7"/><line x1="2" y1="12" x2="22" y2="12"/></svg>`;
  const iconArea  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>`;

  // ── Load seller ────────────────────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const seller = FAKE_USERS.find(u => u.id === params.get('id') && u.role === 'seller');
  const wrap   = document.getElementById('profileContent');

  if (!seller) {
    wrap.innerHTML = `<p style="color:var(--muted);text-align:center;padding:60px 0">Seller not found.</p>`;
  } else {
    const initials      = seller.firstName[0] + seller.lastName[0];
    const sellerListings = FAKE_LISTINGS.filter(l => l.sellerId === seller.id && l.status === 'approved');
    const joined        = new Date(seller.joinedAt);
    const memberSince   = joined.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    const count         = sellerListings.length;

    const cardsHtml = !count
      ? `<div class="empty-state">No active listings from this seller.</div>`
      : sellerListings.map((l, i) => {
          const isRent    = l.listingFor === 'rent';
          const price     = '₱' + l.price.toLocaleString('en-PH');
          const bedsLabel = l.bedrooms === 0 ? 'Studio' : l.bedrooms;
          return `
            <div class="prop-card" style="animation-delay:${0.1 + i * 0.05}s"
                 onclick="window.location.href='listing.html?id=${l.id}'">
              <div class="prop-img-wrap">
                <img src="${l.images[0]}" alt="${l.title}" loading="lazy" />
                <span class="badge-tl ${isRent ? 'badge-rent' : 'badge-sale'}">${isRent ? 'For Rent' : 'For Sale'}</span>
                <span class="badge-tr">${l.images.length} Photo${l.images.length !== 1 ? 's' : ''}</span>
              </div>
              <div class="prop-body">
                <div class="prop-title">
                  ${l.title}
                  <span class="verified-check">${iconCheck}</span>
                </div>
                <div class="prop-address">${iconPin} ${l.address}</div>
                <div class="prop-amenities">
                  <span class="amenity">${iconBed} ${bedsLabel}</span>
                  <span class="amenity">${iconBath} ${l.bathrooms}</span>
                  <span class="amenity">${iconArea} ${l.floorArea} sqm</span>
                </div>
                <div class="prop-footer">
                  <div class="prop-price">${price}${isRent ? `<span class="prop-price-per"> /month</span>` : ''}</div>
                  ${l.negotiable ? `<span class="badge-negotiable">Negotiable</span>` : ''}
                </div>
              </div>
            </div>`;
        }).join('');

    wrap.innerHTML = `
      <div class="profile-card">
        <div class="profile-avatar">${initials}</div>
        <div class="profile-info">
          <div class="profile-name-row">
            <span class="profile-name">${seller.firstName} ${seller.lastName}</span>
            <span class="profile-verified-badge">${iconCheck} Verified</span>
          </div>
          <div class="profile-seller-tag">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Verified Seller
          </div>
          <div class="profile-stats">
            <strong>${count}</strong> Active Listing${count !== 1 ? 's' : ''}
            <span class="profile-stats-dot">•</span>
            Member since ${memberSince}
          </div>
        </div>
      </div>

      <div class="listings-section">
        <div class="listings-section-title">${seller.firstName} ${seller.lastName}'s Listings</div>
        <div class="listings-section-sub">${count} propert${count !== 1 ? 'ies' : 'y'} found</div>
        <div class="listings-grid">${cardsHtml}</div>
      </div>
    `;
  }
</script>
</body>
</html>
