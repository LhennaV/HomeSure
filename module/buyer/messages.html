<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeSure – Messages</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1E293B; --card: #253347; --card2: #1a2739; --border: rgba(255,255,255,0.07);
      --teal: #00c9a7; --teal-faint: rgba(0,201,167,0.12);
      --text: #f1f5f9; --muted: rgba(255,255,255,0.4); --muted2: rgba(255,255,255,0.65);
      --radius: 12px;
    }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
    .layout { display: flex; height: 100vh; }
    .main   { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Content: no padding so messages fill edge-to-edge ── */
    .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    /* ── Messages layout (full area) ── */
    .messages-layout {
      flex: 1; display: flex; overflow: hidden;
      border-top: 1px solid var(--border);
    }

    /* ── Conversation panel (left) ── */
    .conv-panel {
      width: 270px; min-width: 270px;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      background: var(--card2);
    }

    .conv-top {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .conv-title {
      font-size: 16px; font-weight: 800; color: var(--text);
      margin-bottom: 12px;
    }
    .conv-search-wrap {
      position: relative;
    }
    .conv-search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    .conv-search-icon svg { width: 13px; height: 13px; display: block; }
    .conv-search {
      width: 100%; background: rgba(0,0,0,0.2);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 7px 10px 7px 32px;
      color: var(--text); font-family: inherit; font-size: 12.5px; outline: none;
    }
    .conv-search::placeholder { color: var(--muted); }
    .conv-search:focus { border-color: rgba(0,201,167,0.35); }

    .conv-list { flex: 1; overflow-y: auto; }
    .conv-list::-webkit-scrollbar { width: 3px; }
    .conv-list::-webkit-scrollbar-thumb { background: linear-gradient(180deg,#1fc8b4,#0a5e53); border-radius: 99px; }

    .conv-item {
      display: flex; align-items: center; gap: 11px;
      padding: 13px 16px; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.18s;
      position: relative;
    }
    .conv-item:hover { background: rgba(255,255,255,0.04); }
    .conv-item.active { background: rgba(0,201,167,0.08); border-left: 3px solid var(--teal); padding-left: 13px; }

    .conv-avatar {
      width: 44px; height: 44px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0;
    }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name {
      font-size: 13px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .conv-verified svg { width: 11px; height: 11px; color: var(--teal); }
    .conv-preview {
      font-size: 11.5px; color: var(--muted); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .conv-meta {
      display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0;
    }
    .conv-time { font-size: 10.5px; color: var(--muted); }
    .conv-badge {
      background: var(--teal); color: #06201a;
      border-radius: 99px; font-size: 10px; font-weight: 700;
      padding: 1px 6px; min-width: 18px; text-align: center;
    }

    /* ── Chat panel (right) ── */
    .chat-panel {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }

    /* Empty state */
    .chat-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--muted); gap: 10px;
    }
    .chat-empty svg { width: 42px; height: 42px; opacity: 0.35; }
    .chat-empty p { font-size: 13px; }

    /* Chat header */
    .chat-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--card2);
    }
    .chat-header-img {
      width: 44px; height: 44px; border-radius: 8px; object-fit: cover; flex-shrink: 0;
    }
    .chat-header-info { flex: 1; min-width: 0; }
    .chat-header-title {
      font-size: 14px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-header-seller {
      font-size: 11.5px; color: var(--muted);
      display: flex; align-items: center; gap: 4px; margin-top: 1px;
    }
    .chat-header-seller svg { width: 11px; height: 11px; color: var(--teal); }
    .chat-header-price {
      font-size: 15px; font-weight: 800; color: var(--text); text-align: right; flex-shrink: 0;
    }
    .chat-header-price span { display: block; font-size: 10.5px; color: var(--muted); font-weight: 400; }

    /* Messages thread */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 20px 20px 10px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: linear-gradient(180deg,#1fc8b4,#0a5e53); border-radius: 99px; }

    .msg-date-divider {
      text-align: center; font-size: 11px; color: var(--muted);
      margin: 6px 0;
    }

    .msg-row {
      display: flex; align-items: flex-end; gap: 8px;
    }
    .msg-row.buyer { flex-direction: row-reverse; }

    .msg-bubble {
      max-width: 65%; padding: 10px 14px; border-radius: 14px;
      font-size: 13px; line-height: 1.55;
    }
    .msg-row.seller .msg-bubble {
      background: var(--card); color: var(--text);
      border-radius: 14px 14px 14px 4px;
    }
    .msg-row.buyer .msg-bubble {
      background: var(--teal); color: #06201a;
      border-radius: 14px 14px 4px 14px;
    }

    .msg-time {
      font-size: 10px; color: var(--muted); flex-shrink: 0; margin-bottom: 2px;
    }
    .msg-row.buyer .msg-time {
      display: flex; align-items: center; gap: 3px;
    }
    .msg-row.buyer .msg-time svg { width: 12px; height: 12px; color: var(--teal); }

    /* Input area */
    .chat-input-area {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--card2);
    }
    .chat-input-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 6px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.2s, background 0.2s; flex-shrink: 0;
    }
    .chat-input-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
    .chat-input-btn svg { width: 17px; height: 17px; }
    .chat-input {
      flex: 1; background: rgba(0,0,0,0.2);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 9px 14px; color: var(--text);
      font-family: inherit; font-size: 13px; outline: none;
    }
    .chat-input::placeholder { color: var(--muted); }
    .chat-input:focus { border-color: rgba(0,201,167,0.35); }
    .chat-send-btn {
      background: var(--teal); border: none; border-radius: 10px;
      padding: 9px 14px; cursor: pointer; color: #06201a;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.15s; flex-shrink: 0;
    }
    .chat-send-btn:hover { background: #00b394; transform: scale(1.05); }
    .chat-send-btn svg { width: 16px; height: 16px; }

    /* ── Light mode ── */
    [data-theme="light"] {
      --bg: #f1f5f9; --card: #ffffff; --card2: #f8fafc; --border: rgba(0,0,0,0.09);
      --text: #1e293b; --muted: rgba(0,0,0,0.45); --muted2: rgba(0,0,0,0.6);
    }
    [data-theme="light"] body { background: var(--bg); }
    [data-theme="light"] .conv-search { background: rgba(0,0,0,0.04); }
    [data-theme="light"] .chat-input  { background: rgba(0,0,0,0.04); }
    [data-theme="light"] .msg-row.buyer .msg-bubble { color: #fff; }
  </style>
</head>
<body>
<div class="layout">
  <div id="hs-sidebar"></div>
  <div class="main">
    <div id="hs-topbar"></div>
    <div class="content">
      <div class="messages-layout">

        <!-- ── Conversation list ── -->
        <div class="conv-panel">
          <div class="conv-top">
            <div class="conv-title">Messages</div>
            <div class="conv-search-wrap">
              <span class="conv-search-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              </span>
              <input class="conv-search" id="convSearch" placeholder="Search conversations..." oninput="filterConvs()" />
            </div>
          </div>
          <div class="conv-list" id="convList"></div>
        </div>

        <!-- ── Chat area ── -->
        <div class="chat-panel" id="chatPanel">
          <div class="chat-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <p>Select a conversation to start messaging</p>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="../../assets/js/fake-data.js"></script>
<script src="../../components/sidebar.js"></script>
<script src="../../components/topbar.js"></script>
<script>
  const user = getSession();
  if (!user || user.role !== 'buyer') window.location.href = '../../auth/signin.html';

  HomeSureSidebar.init({ activePage: 'messages' });
  HomeSureTopbar.init({ placeholder: 'Search messages...' });

  // ── Fake conversations ─────────────────────────────────────────────────────
  const CONVS = [
    {
      id: 'c1', listingId: 'prop-002', sellerId: 'usr-003', unread: 2, dateLabel: 'Feb 27',
      messages: [
        { from: 'buyer',  text: "Hi! I'm interested in this apartment. Is it still available?", time: '9:15 AM', read: true },
        { from: 'seller', text: 'Hello! Thank you for your interest. Yes, the unit is still available.', time: '9:45 AM' },
        { from: 'buyer',  text: 'Great! Can I schedule a viewing this weekend?', time: '10:00 AM', read: true },
        { from: 'seller', text: 'Sure! Saturday or Sunday works for me. What time do you prefer?', time: '10:05 AM' },
      ],
    },
    {
      id: 'c2', listingId: 'prop-003', sellerId: 'usr-003', unread: 0, dateLabel: 'Feb 26',
      messages: [
        { from: 'buyer',  text: 'Hello, is the house still available for viewing?', time: '2:00 PM', read: true },
        { from: 'seller', text: 'Yes it is! The property also includes a garden area, perfect for families.', time: '2:30 PM' },
        { from: 'buyer',  text: 'That sounds great. What is the earliest move-in date?', time: '2:45 PM', read: true },
        { from: 'seller', text: 'We can arrange move-in as early as next month.', time: '3:00 PM' },
      ],
    },
    {
      id: 'c3', listingId: 'prop-009', sellerId: 'usr-004', unread: 0, dateLabel: 'Feb 25',
      messages: [
        { from: 'buyer',  text: 'Is there a possibility of negotiating the price?', time: '11:00 AM', read: true },
        { from: 'seller', text: 'The price is fixed for now but I can include some appliances.', time: '11:20 AM' },
        { from: 'buyer',  text: 'Thank you for the information!', time: '11:35 AM', read: true },
      ],
    },
  ];

  // ── Icons ──────────────────────────────────────────────────────────────────
  const iconCheck2 = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  const iconSend   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;
  const iconClip   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>`;

  const iconVerify = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

  let activeConvId = null;

  // ── Render conversation list ───────────────────────────────────────────────
  function renderConvList(filter = '') {
    const list = document.getElementById('convList');
    const filtered = CONVS.filter(c => {
      const l = FAKE_LISTINGS.find(x => x.id === c.listingId);
      const s = FAKE_USERS.find(x => x.id === c.sellerId);
      const q = filter.toLowerCase();
      return !q || (l && l.title.toLowerCase().includes(q)) || (s && (s.firstName + ' ' + s.lastName).toLowerCase().includes(q));
    });

    list.innerHTML = filtered.map(c => {
      const l = FAKE_LISTINGS.find(x => x.id === c.listingId);
      const s = FAKE_USERS.find(x => x.id === c.sellerId);
      if (!l || !s) return '';
      const last = c.messages[c.messages.length - 1];
      const sellerName = s.firstName + ' ' + s.lastName;
      return `
        <div class="conv-item ${c.id === activeConvId ? 'active' : ''}"
             onclick="openConv('${c.id}')">
          <img class="conv-avatar" src="${l.images[0]}" alt="${l.title}" />
          <div class="conv-info">
            <div class="conv-name">
              ${l.title.length > 22 ? l.title.slice(0, 22) + '…' : l.title}
              <span class="conv-verified">${iconVerify}</span>
            </div>
            <div class="conv-preview">${sellerName} · ${last.text.slice(0, 32)}${last.text.length > 32 ? '…' : ''}</div>
          </div>
          <div class="conv-meta">
            <span class="conv-time">${c.dateLabel}</span>
            ${c.unread > 0 ? `<span class="conv-badge">${c.unread}</span>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  function filterConvs() {
    renderConvList(document.getElementById('convSearch').value);
  }

  // ── Open a conversation ────────────────────────────────────────────────────
  function openConv(id) {
    activeConvId = id;
    const c = CONVS.find(x => x.id === id);
    const l = FAKE_LISTINGS.find(x => x.id === c.listingId);
    const s = FAKE_USERS.find(x => x.id === c.sellerId);
    c.unread = 0;

    renderConvList(document.getElementById('convSearch').value);

    const isRent     = l.listingFor === 'rent';
    const price      = '₱' + l.price.toLocaleString('en-PH');
    const sellerName = s.firstName + ' ' + s.lastName;

    const messagesHtml = `
      <div class="msg-date-divider">${c.dateLabel}</div>` +
      c.messages.map(m => `
        <div class="msg-row ${m.from}">
          <div class="msg-bubble">${m.text}</div>
          <div class="msg-time">
            ${m.time}
            ${m.from === 'buyer' && m.read ? iconCheck2 : ''}
          </div>
        </div>`).join('');

    document.getElementById('chatPanel').innerHTML = `
      <div class="chat-header">
        <img class="chat-header-img" src="${l.images[0]}" alt="${l.title}" />
        <div class="chat-header-info">
          <div class="chat-header-title">${l.title}</div>
          <div class="chat-header-seller">${iconVerify} ${sellerName}</div>
        </div>
        <div class="chat-header-price">
          ${price}
          ${isRent ? `<span>/month</span>` : ''}
        </div>
      </div>

      <div class="chat-messages" id="chatMessages">${messagesHtml}</div>

      <div class="chat-input-area">
        <button class="chat-input-btn" title="Attach file">${iconClip}</button>
        <input class="chat-input" id="chatInput" placeholder="Type a message..."
               onkeydown="if(event.key==='Enter') sendMessage('${id}')" />
        <button class="chat-send-btn" onclick="sendMessage('${id}')">${iconSend}</button>
      </div>
    `;

    // Scroll to bottom
    const msgs = document.getElementById('chatMessages');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
  }

  // ── Send a message ─────────────────────────────────────────────────────────
  function sendMessage(convId) {
    const input = document.getElementById('chatInput');
    const text  = input.value.trim();
    if (!text) return;

    const c = CONVS.find(x => x.id === convId);
    const now = new Date();
    const time = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    c.messages.push({ from: 'buyer', text, time, read: false });
    input.value = '';

    const msgs = document.getElementById('chatMessages');
    const row  = document.createElement('div');
    row.className = 'msg-row buyer';
    row.innerHTML = `<div class="msg-bubble">${text}</div><div class="msg-time">${time}</div>`;
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  renderConvList();
</script>
</body>
</html>
