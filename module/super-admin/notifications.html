<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="../../assets/img/image.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeSure – Notifications</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../assets/css/notifications.css" />
  <link rel="stylesheet" href="../../assets/css/responsive.css" />
</head>
<body>
<div class="layout">
  <div id="hs-sidebar"></div>
  <div class="main">
    <div id="hs-topbar"></div>
    <div class="content">
      <div class="page-header">
        <div class="page-title">Notifications</div>
        <button class="mark-all-btn" onclick="markAllRead()">Mark all as read</button>
      </div>
      <div class="notif-tabs">
        <button class="notif-tab active" data-tab="all" onclick="switchTab(this,'all')">All</button>
        <button class="notif-tab" data-tab="unread" onclick="switchTab(this,'unread')">Unread <span id="unreadCount"></span></button>
      </div>
      <div class="notif-list" id="notifList"></div>
    </div>
  </div>
</div>
<script src="../../assets/js/fake-data.js"></script>
<script src="../../components/sidebar.js"></script>
<script src="../../components/topbar.js"></script>
<script src="../../assets/js/super-admin/superadmin-notifications.js"></script>
</body>
</html>
