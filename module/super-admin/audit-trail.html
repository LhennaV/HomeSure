<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="../../assets/img/image.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeSure – Audit Trail</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../assets/css/super-admin/super-admin.css" />
  <link rel="stylesheet" href="../../assets/css/super-admin/audit-trail.css" />
  <link rel="stylesheet" href="../../assets/css/responsive.css" />
</head>
<body>
<div class="layout">
  <div id="hs-sidebar"></div>
  <div class="main">
    <div id="hs-topbar"></div>
    <div class="content">

      <!-- Page Header -->
      <div class="page-header">
        <div>
          <h1 class="page-title">Audit Trail</h1>
          <p class="page-sub">Complete log of all significant actions across the platform.</p>
        </div>
        <div class="header-actions">
          <div class="search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="auditSearch" placeholder="Search user, action, IP…" />
          </div>
        </div>
      </div>

      <!-- Filter Tabs -->
      <div class="section-card">
        <div class="filter-tabs" id="auditTabs">
          <button class="filter-tab active" data-type="all">All</button>
          <button class="filter-tab" data-type="listing">Listings</button>
          <button class="filter-tab" data-type="user">Users</button>
          <button class="filter-tab" data-type="report">Reports</button>
          <button class="filter-tab" data-type="admin">Admins</button>
          <button class="filter-tab" data-type="system">System</button>
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th>Timestamp</th>
              <th>User</th>
              <th>Role</th>
              <th>Action</th>
              <th>IP Address</th>
              <th>Status</th>
              <th>Details</th>
            </tr>
          </thead>
          <tbody id="auditTable"></tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script src="../../assets/js/fake-data.js"></script>
<script src="../../components/sidebar.js"></script>
<script src="../../components/topbar.js"></script>
<script src="../../assets/js/super-admin/audit-trail.js"></script>
</body>
</html>
