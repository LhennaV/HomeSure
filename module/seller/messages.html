<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeSure – Messages</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1E293B; --card: #253347; --card2: #2c3d55; --border: rgba(255,255,255,0.07);
      --teal: #00c9a7; --teal-faint: rgba(0,201,167,0.12); --teal-mid: rgba(0,201,167,0.25);
      --text: #f1f5f9; --muted: rgba(255,255,255,0.4); --muted2: rgba(255,255,255,0.65);
      --amber: #f59e0b; --amber-faint: rgba(245,158,11,0.1); --amber-mid: rgba(245,158,11,0.28);
      --radius: 14px;
    }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
    .layout { display: flex; height: 100vh; }
    .main   { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .content { flex: 1; overflow-y: auto; padding: 22px 26px 32px; }
    .content::-webkit-scrollbar { width: 5px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #1fc8b4, #0a5e53); border-radius: 99px; }
    .content::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #24e0ca, #1a9e8f); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Page header ── */
    .page-header { margin-bottom: 20px; animation: fadeUp 0.3s ease both; }
    .page-title  { font-size: 22px; font-weight: 800; }

    /* ══════════════════════════════════════
       LOCKED / EMPTY STATE (non-verified)
    ══════════════════════════════════════ */
    .locked-wrap { display: flex; flex-direction: column; gap: 18px; animation: fadeUp 0.35s ease 0.05s both; }

    .amber-banner {
      background: var(--amber-faint); border: 1px solid var(--amber-mid);
      border-radius: var(--radius); padding: 14px 18px;
      display: flex; align-items: flex-start; gap: 13px;
    }
    .amber-banner-icon {
      width: 34px; height: 34px; border-radius: 9px;
      background: rgba(245,158,11,0.18); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
    }
    .amber-banner-icon svg { width: 18px; height: 18px; color: var(--amber); }
    .amber-banner-text { flex: 1; min-width: 0; }
    .amber-banner-title { font-size: 13.5px; font-weight: 700; color: var(--amber); margin-bottom: 3px; }
    .amber-banner-body  { font-size: 13px; color: var(--muted2); line-height: 1.5; }

    .empty-state-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 60px 24px;
      display: flex; flex-direction: column; align-items: center; gap: 0; text-align: center;
    }
    .empty-icon-wrap {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--teal-faint); display: flex; align-items: center; justify-content: center; margin-bottom: 18px;
    }
    .empty-icon-wrap svg { width: 32px; height: 32px; color: var(--teal); }
    .empty-title   { font-size: 17px; font-weight: 800; margin-bottom: 7px; }
    .empty-sub     { font-size: 13.5px; color: var(--muted2); max-width: 320px; line-height: 1.55; margin-bottom: 24px; }

    .btn-teal {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--teal); color: #fff; font-family: inherit;
      font-size: 13.5px; font-weight: 700; padding: 10px 22px;
      border: none; border-radius: 10px; cursor: pointer; text-decoration: none;
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn-teal:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-teal svg { width: 16px; height: 16px; }

    /* ══════════════════════════════════════
       MESSAGES LAYOUT (verified)
    ══════════════════════════════════════ */
    .messages-shell {
      display: flex; gap: 0;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      height: calc(100vh - 120px);
      animation: fadeUp 0.35s ease 0.05s both;
    }

    /* ── Conversation list ── */
    .conv-list {
      width: 280px; flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .conv-list-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .conv-list-title { font-size: 14px; font-weight: 800; }
    .conv-list-count { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .conv-items { flex: 1; overflow-y: auto; }
    .conv-items::-webkit-scrollbar { width: 4px; }
    .conv-items::-webkit-scrollbar-track { background: transparent; }
    .conv-items::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #1fc8b4, #0a5e53); border-radius: 99px; }

    .conv-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 18px; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s; position: relative;
    }
    .conv-item:last-child { border-bottom: none; }
    .conv-item:hover { background: rgba(255,255,255,0.04); }
    .conv-item.active { background: var(--teal-faint); border-right: 2px solid var(--teal); }

    .conv-avatar {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff;
    }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 2px; }
    .conv-name  { font-size: 13.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-time  { font-size: 11px; color: var(--muted); flex-shrink: 0; }
    .conv-listing { font-size: 11.5px; color: var(--teal); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .conv-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-item.has-unread .conv-preview { color: var(--text); font-weight: 600; }

    .unread-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--teal); flex-shrink: 0;
    }

    /* ── Thread panel ── */
    .thread-panel {
      flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0;
    }

    .thread-header {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 13px; flex-shrink: 0;
    }
    .thread-avatar {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: #fff;
    }
    .thread-header-info { flex: 1; min-width: 0; }
    .thread-buyer-name  { font-size: 14px; font-weight: 800; }
    .thread-listing-ref { font-size: 12px; color: var(--teal); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .thread-messages {
      flex: 1; overflow-y: auto;
      padding: 20px; display: flex; flex-direction: column; gap: 14px;
    }
    .thread-messages::-webkit-scrollbar { width: 5px; }
    .thread-messages::-webkit-scrollbar-track { background: transparent; }
    .thread-messages::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #1fc8b4, #0a5e53); border-radius: 99px; }

    .msg-row {
      display: flex; align-items: flex-end; gap: 9px;
    }
    .msg-row.buyer  { flex-direction: row; }
    .msg-row.seller { flex-direction: row-reverse; }

    .msg-avatar-sm {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800; color: #fff;
    }

    .msg-bubble {
      max-width: 68%; padding: 10px 14px;
      border-radius: 14px; font-size: 13.5px; line-height: 1.5;
    }
    .msg-row.buyer  .msg-bubble { background: var(--card2); color: var(--text); border-bottom-left-radius: 4px; }
    .msg-row.seller .msg-bubble { background: var(--teal); color: #fff; border-bottom-right-radius: 4px; }

    .msg-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .msg-row.buyer  .msg-meta { text-align: left; padding-left: 39px; }
    .msg-row.seller .msg-meta { text-align: right; padding-right: 39px; }

    /* compose bar — decorative only */
    .compose-bar {
      padding: 12px 16px; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .compose-input {
      flex: 1; background: var(--card2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      color: var(--muted); font-family: inherit; font-size: 13px;
      outline: none; cursor: default;
    }
    .compose-send {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--teal-faint); border: 1px solid var(--teal-mid);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; cursor: default; opacity: 0.6;
    }
    .compose-send svg { width: 16px; height: 16px; color: var(--teal); }

    /* date divider */
    .date-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 4px 0;
    }
    .date-divider::before, .date-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .date-divider span { font-size: 11px; color: var(--muted); font-weight: 600; white-space: nowrap; }

    /* ══════════════════════════════════════
       LIGHT MODE
    ══════════════════════════════════════ */
    [data-theme="light"] {
      --bg: #f1f5f9; --card: #ffffff; --card2: #f8fafc; --border: rgba(0,0,0,0.09);
      --text: #1e293b; --muted: rgba(0,0,0,0.45); --muted2: rgba(0,0,0,0.6);
    }
    [data-theme="light"] .conv-item:hover { background: rgba(0,0,0,0.025); }
    [data-theme="light"] .conv-item.active { background: rgba(0,201,167,0.07); }
    [data-theme="light"] .msg-row.buyer .msg-bubble { background: #f1f5f9; border: 1px solid rgba(0,0,0,0.07); }
    [data-theme="light"] .compose-input { background: #f8fafc; color: rgba(0,0,0,0.4); }
    [data-theme="light"] .amber-banner-body { color: rgba(0,0,0,0.6); }
    [data-theme="light"] .empty-sub { color: rgba(0,0,0,0.55); }
  </style>
</head>
<body>
<div class="layout">
  <div id="hs-sidebar"></div>
  <div class="main">
    <div id="hs-topbar"></div>
    <div class="content" id="mainContent">

      <div class="page-header">
        <div class="page-title">Messages</div>
      </div>

      <div id="pageBody"></div>

    </div>
  </div>
</div>

<script src="../../assets/js/fake-data.js"></script>
<script src="../../components/sidebar.js"></script>
<script src="../../components/topbar.js"></script>
<script>
  /* ── Auth guard ── */
  const session = getSession();
  if (!session || session.role !== 'seller') window.location.href = '../../auth/signin.html';

  HomeSureSidebar.init({ activePage: 'messages' });
  HomeSureTopbar.init({ placeholder: 'Search messages...' });

  /* ── Resolve full seller from FAKE_USERS ── */
  const fullUser = FAKE_USERS.find(u => u.id === session.id) || {};
  const isVerified = fullUser.accountStatus === 'verified';

  /* ══════════════════════════════════════════════
     FAKE CONVERSATIONS (for verified seller)
  ══════════════════════════════════════════════ */
  const CONVERSATIONS = [
    {
      id: 'conv-1',
      buyer:   { initials: 'MS', name: 'Maria Santos',  color: '#0f766e' },
      listing: '1-Bedroom Apartment for Rent near Town Proper',
      preview: 'Is it still available this April?',
      time:    '10:42 AM',
      unread:  false,
      messages: [
        { from: 'buyer',  text: 'Hi! I saw your listing for the 1-Bedroom Apartment near Town Proper. Is it still available?', time: 'Mar 30, 9:14 AM' },
        { from: 'seller', text: 'Hello Maria! Yes, it\'s still available. Would you like to schedule a viewing?', time: 'Mar 30, 9:28 AM' },
        { from: 'buyer',  text: 'That\'d be great! Is it still available this April?', time: 'Today, 10:42 AM' },
      ],
    },
    {
      id: 'conv-2',
      buyer:   { initials: 'JR', name: 'Jose Reyes',    color: '#3b82f6' },
      listing: '3-Bedroom House for Sale in Pulong Yantok',
      preview: 'Is the price still negotiable?',
      time:    '9:05 AM',
      unread:  true,
      messages: [
        { from: 'buyer', text: 'Good morning! I\'m very interested in the 3-Bedroom House in Pulong Yantok. Is the price still negotiable?', time: 'Today, 9:05 AM' },
      ],
    },
    {
      id: 'conv-3',
      buyer:   { initials: 'CM', name: 'Carlo Mendoza', color: '#8b5cf6' },
      listing: 'Studio in Sonoma',
      preview: 'What floor is the unit on?',
      time:    'Yesterday',
      unread:  false,
      messages: [
        { from: 'buyer',  text: 'Hi Ramon! I\'m interested in the Studio in Sonoma. What floor is the unit on?', time: 'Yesterday, 4:18 PM' },
        { from: 'seller', text: 'Hi Carlo! The unit is on the 3rd floor with a nice garden view. It\'s also fully air-conditioned.', time: 'Yesterday, 4:55 PM' },
      ],
    },
  ];

  let activeConvId = CONVERSATIONS[0].id;

  /* ══════════════════════════════════════
     RENDER
  ══════════════════════════════════════ */
  function render() {
    const body = document.getElementById('pageBody');
    if (!isVerified) {
      body.innerHTML = renderLocked();
    } else {
      body.innerHTML = renderMessages();
      attachConvListeners();
    }
  }

  /* ── Locked state ── */
  function renderLocked() {
    return `
      <div class="locked-wrap">
        <div class="amber-banner">
          <div class="amber-banner-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </div>
          <div class="amber-banner-text">
            <div class="amber-banner-title">Messages not available yet</div>
            <div class="amber-banner-body">You don't have any messages yet. Once you publish your first listing, buyers will be able to contact you here.</div>
          </div>
        </div>

        <div class="empty-state-box">
          <div class="empty-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
              <!-- inbox icon -->
            </svg>
          </div>
          <div class="empty-icon-wrap" style="display:none"></div>
          <div class="empty-title">No messages yet</div>
          <div class="empty-sub">Messages from buyers about your listings will appear here once you're verified and your listing is published.</div>
          <a class="btn-teal" href="verification.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            Complete Verification
          </a>
        </div>
      </div>`;
  }

  /* ── Full messages layout ── */
  function renderMessages() {
    const conv = CONVERSATIONS.find(c => c.id === activeConvId) || CONVERSATIONS[0];
    return `
      <div class="messages-shell">
        ${renderConvList()}
        ${renderThread(conv)}
      </div>`;
  }

  function renderConvList() {
    const unreadCount = CONVERSATIONS.filter(c => c.unread).length;
    const items = CONVERSATIONS.map(c => `
      <div class="conv-item ${c.unread ? 'has-unread' : ''} ${c.id === activeConvId ? 'active' : ''}" data-conv="${c.id}">
        <div class="conv-avatar" style="background:${c.buyer.color}">${c.buyer.initials}</div>
        <div class="conv-info">
          <div class="conv-name-row">
            <span class="conv-name">${c.buyer.name}</span>
            <span class="conv-time">${c.time}</span>
          </div>
          <div class="conv-listing">${c.listing}</div>
          <div class="conv-preview">${c.preview}</div>
        </div>
        ${c.unread ? '<div class="unread-dot"></div>' : ''}
      </div>`).join('');

    return `
      <div class="conv-list">
        <div class="conv-list-header">
          <div class="conv-list-title">Conversations</div>
          <div class="conv-list-count">${CONVERSATIONS.length} total${unreadCount ? ` · ${unreadCount} unread` : ''}</div>
        </div>
        <div class="conv-items">${items}</div>
      </div>`;
  }

  function renderThread(conv) {
    /* Group messages: put a date divider before the first "Today" message */
    const earlierMsgs = conv.messages.filter(m => !m.time.startsWith('Today'));
    const todayMsgs   = conv.messages.filter(m =>  m.time.startsWith('Today'));

    let msgHtml = '';
    if (earlierMsgs.length) {
      const firstDate = earlierMsgs[0].time.split(',')[0];
      msgHtml += `<div class="date-divider"><span>${firstDate}</span></div>`;
      msgHtml += earlierMsgs.map(m => msgBubble(m, conv.buyer)).join('');
    }
    if (todayMsgs.length) {
      msgHtml += `<div class="date-divider"><span>Today</span></div>`;
      msgHtml += todayMsgs.map(m => msgBubble(m, conv.buyer)).join('');
    }
    if (!conv.messages.length) {
      msgHtml = `<div style="margin:auto;text-align:center;color:var(--muted);font-size:13.5px;">No messages yet.</div>`;
    }

    return `
      <div class="thread-panel">
        <div class="thread-header">
          <div class="thread-avatar" style="background:${conv.buyer.color}">${conv.buyer.initials}</div>
          <div class="thread-header-info">
            <div class="thread-buyer-name">${conv.buyer.name}</div>
            <div class="thread-listing-ref">${conv.listing}</div>
          </div>
        </div>
        <div class="thread-messages">${msgHtml}</div>
        <div class="compose-bar">
          <div class="compose-input">Type a message…</div>
          <div class="compose-send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </div>
        </div>
      </div>`;
  }

  function msgBubble(msg, buyer) {
    const isSeller = msg.from === 'seller';
    const initials = isSeller
      ? (session.firstName[0] + session.lastName[0]).toUpperCase()
      : buyer.initials;
    const color = isSeller ? '#00c9a7' : buyer.color;
    const timeLabel = msg.time.includes(',') ? msg.time.split(', ')[1] : msg.time;
    return `
      <div class="msg-row ${msg.from}">
        <div class="msg-avatar-sm" style="background:${color}">${initials}</div>
        <div class="msg-bubble">${msg.text}</div>
      </div>
      <div class="msg-meta">${timeLabel}</div>`;
  }

  function attachConvListeners() {
    document.querySelectorAll('.conv-item').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.conv;
        /* Mark as read */
        const c = CONVERSATIONS.find(x => x.id === id);
        if (c) c.unread = false;
        activeConvId = id;
        document.getElementById('pageBody').innerHTML = renderMessages();
        attachConvListeners();
      });
    });
  }

  render();
</script>
</body>
</html>
