<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeSure – My Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1E293B;
      --card:       #253347;
      --card2:      #2c3d55;
      --border:     rgba(255,255,255,0.07);
      --teal:       #00c9a7;
      --teal-faint: rgba(0,201,167,0.12);
      --teal-mid:   rgba(0,201,167,0.25);
      --text:       #f1f5f9;
      --muted:      rgba(255,255,255,0.4);
      --muted2:     rgba(255,255,255,0.65);
      --danger:     #f87171;
      --radius:     14px;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .layout { display: flex; height: 100vh; }
    .main   { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Content area ─────────────────────────────────────────── */
    .content { flex: 1; overflow-y: auto; padding: 22px 26px 32px; }
    .content::-webkit-scrollbar { width: 5px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #1fc8b4, #0a5e53);
      border-radius: 99px;
    }
    .content::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #24e0ca, #1a9e8f);
    }

    /* ── Profile card ─────────────────────────────────────────── */
    .profile-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
      display: flex;
      align-items: center;
      gap: 22px;
      margin-bottom: 26px;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #00c9a7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    .profile-info { flex: 1; min-width: 0; }

    .profile-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .profile-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .profile-meta-item {
      font-size: 11.5px;
      color: var(--muted);
    }

    .meta-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    /* ── Account status badges ────────────────────────────────── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }

    .status-verified {
      background: var(--teal-faint);
      color: var(--teal);
      border: 1px solid var(--teal-mid);
    }

    .status-pending {
      background: rgba(251,191,36,0.12);
      color: #fbbf24;
      border: 1px solid rgba(251,191,36,0.28);
    }

    .status-unverified {
      background: rgba(255,255,255,0.06);
      color: var(--muted2);
      border: 1px solid var(--border);
    }

    .status-badge svg { width: 12px; height: 12px; }

    /* ── Listings section header ──────────────────────────────── */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .section-sub {
      font-size: 11.5px;
      color: var(--muted);
    }

    /* ── Listings grid ────────────────────────────────────────── */
    .listings-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    /* ── Property card ────────────────────────────────────────── */
    .prop-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .prop-card:hover {
      transform: translateY(-4px);
      border-color: rgba(0,201,167,0.35);
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    .prop-img-wrap { position: relative; height: 155px; overflow: hidden; }
    .prop-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.35s ease;
    }
    .prop-card:hover .prop-img-wrap img { transform: scale(1.06); }
    .prop-img-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.38) 100%);
      pointer-events: none;
    }

    .badge-tl {
      position: absolute; top: 10px; left: 10px; z-index: 1;
      padding: 3px 9px; border-radius: 20px;
      font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
    }
    .badge-rent { background: #00c9a7; color: #06201a; }
    .badge-sale { background: #3b82f6; color: #051226; }

    .badge-tr {
      position: absolute; top: 10px; right: 10px; z-index: 1;
      padding: 3px 9px; border-radius: 20px;
      font-size: 9.5px; font-weight: 600; letter-spacing: 0.04em;
      background: rgba(0,0,0,0.5); color: #e2e8f0; backdrop-filter: blur(4px);
    }

    .verified-check {
      display: inline-flex; align-items: center; justify-content: center;
      width: 15px; height: 15px; border-radius: 50%;
      background: #00c9a7; flex-shrink: 0; vertical-align: middle;
      margin-left: 5px; position: relative; top: -1px;
    }
    .verified-check svg { width: 9px; height: 9px; color: #fff; display: block; }

    .prop-body { padding: 13px 14px 14px; }

    .prop-title {
      font-size: 13px; font-weight: 700; color: var(--text);
      margin-bottom: 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .prop-address {
      font-size: 11px; color: var(--muted);
      display: flex; align-items: flex-start; gap: 4px;
      margin-bottom: 11px; overflow: hidden;
      white-space: nowrap; text-overflow: ellipsis;
    }
    .prop-address svg { width: 11px; height: 11px; flex-shrink: 0; margin-top: 1px; }

    .prop-amenities { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .amenity {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--muted2);
    }
    .amenity svg { width: 12px; height: 12px; color: var(--muted); }

    .prop-footer { display: flex; align-items: flex-end; justify-content: space-between; }
    .prop-price { font-size: 15px; font-weight: 800; color: var(--text); line-height: 1.2; }
    .prop-price-per { font-size: 10.5px; color: var(--muted); font-weight: 400; }
    .badge-negotiable {
      padding: 2px 8px; border-radius: 20px;
      background: var(--teal-faint); color: var(--teal);
      font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    }

    /* ── Empty state ──────────────────────────────────────────── */
    .empty-state {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 64px 32px;
      text-align: center;
    }

    .empty-icon {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--teal-faint);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
    }
    .empty-icon svg { width: 24px; height: 24px; color: var(--teal); }

    .empty-title {
      font-size: 14px; font-weight: 700; color: var(--text);
      margin-bottom: 6px;
    }

    .empty-sub { font-size: 12.5px; color: var(--muted); }

    /* ── Light mode ───────────────────────────────────────────── */
    [data-theme="light"] {
      --bg: #f1f5f9; --card: #ffffff; --border: rgba(0,0,0,0.09);
      --text: #1e293b; --muted: rgba(0,0,0,0.45); --muted2: rgba(0,0,0,0.6);
    }
    [data-theme="light"] body { background: var(--bg); color: var(--text); }
    [data-theme="light"] .prop-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    [data-theme="light"] .content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); }
    [data-theme="light"] .status-unverified { background: rgba(0,0,0,0.05); color: rgba(0,0,0,0.45); }
  </style>
</head>
<body>
<div class="layout">
  <div id="hs-sidebar"></div>

  <div class="main">
    <div id="hs-topbar"></div>

    <div class="content">

      <!-- Profile Card -->
      <div class="profile-card" id="profileCard">
        <div class="avatar" id="profileAvatar"></div>
        <div class="profile-info">
          <div class="profile-name" id="profileName"></div>
          <div class="profile-meta" id="profileMeta"></div>
        </div>
        <div id="statusBadge"></div>
      </div>

      <!-- Listings Section -->
      <div class="section-header">
        <div class="section-title" id="sectionTitle"></div>
        <div class="section-sub" id="sectionSub"></div>
      </div>

      <div id="listingsContainer"></div>

    </div>
  </div>
</div>

<script src="../../assets/js/fake-data.js"></script>
<script src="../../components/sidebar.js"></script>
<script src="../../components/topbar.js"></script>
<script>
  // ── Auth guard ──────────────────────────────────────────────────────────────
  const session = getSession();
  if (!session || session.role !== 'seller') window.location.href = '../../auth/signin.html';

  // ── Init shared components ──────────────────────────────────────────────────
  HomeSureSidebar.init({ activePage: 'profile' });
  HomeSureTopbar.init({ placeholder: 'Search...' });

  // ── Resolve current seller from FAKE_USERS ──────────────────────────────────
  const seller = FAKE_USERS.find(u => u.id === session.id) || null;
  if (!seller) window.location.href = '../../auth/signin.html';

  // ── Helpers ─────────────────────────────────────────────────────────────────
  const iconBed  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/></svg>`;
  const iconBath = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6 6.5 3.5a1.5 1.5 0 0 0-1-.5C4.683 3 4 3.683 4 4.5V17a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5"/><line x1="10" y1="5" x2="8" y2="7"/><line x1="2" y1="12" x2="22" y2="12"/></svg>`;
  const iconArea = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>`;
  const iconPin  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
  const iconHome = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;

  function formatJoinDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  }

  // ── Approved listings for this seller ───────────────────────────────────────
  const approvedListings = FAKE_LISTINGS.filter(
    l => l.sellerId === seller.id && l.status === 'approved'
  );

  // ── Render profile card ──────────────────────────────────────────────────────
  const initials = (seller.firstName[0] || '') + (seller.lastName[0] || '');
  document.getElementById('profileAvatar').textContent = initials.toUpperCase();

  document.getElementById('profileName').textContent =
    seller.firstName + ' ' + seller.lastName;

  const activeCount = approvedListings.length;
  const metaItems = [
    `<span class="profile-meta-item">${activeCount} Active Listing${activeCount !== 1 ? 's' : ''}</span>`,
    `<span class="meta-dot"></span>`,
    `<span class="profile-meta-item">Member since ${formatJoinDate(seller.joinedAt)}</span>`,
  ];
  document.getElementById('profileMeta').innerHTML = metaItems.join('');

  // Status badge
  const status = seller.accountStatus || 'unverified';
  let badgeHTML = '';
  if (status === 'verified') {
    badgeHTML = `
      <div class="status-badge status-verified">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Verified
      </div>`;
  } else if (status === 'pending') {
    badgeHTML = `
      <div class="status-badge status-pending">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        Pending
      </div>`;
  } else {
    badgeHTML = `<div class="status-badge status-unverified">Unverified</div>`;
  }
  document.getElementById('statusBadge').innerHTML = badgeHTML;

  // ── Listings section header ──────────────────────────────────────────────────
  const firstName = seller.firstName;
  document.getElementById('sectionTitle').textContent = `${firstName}'s Listings`;
  document.getElementById('sectionSub').textContent =
    activeCount === 0
      ? 'No properties found'
      : `${activeCount} propert${activeCount !== 1 ? 'ies' : 'y'} found`;

  // ── Render listings ──────────────────────────────────────────────────────────
  const container = document.getElementById('listingsContainer');

  if (approvedListings.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${iconHome}</div>
        <div class="empty-title">${seller.firstName} ${seller.lastName} has no active listings yet.</div>
        <div class="empty-sub">Approved listings will appear here once published.</div>
      </div>`;
  } else {
    const grid = document.createElement('div');
    grid.className = 'listings-grid';

    grid.innerHTML = approvedListings.map((l, i) => {
      const isRent = l.listingFor === 'rent';
      const typeBadge = isRent
        ? `<span class="badge-tl badge-rent">For Rent</span>`
        : `<span class="badge-tl badge-sale">For Sale</span>`;
      const photoBadge = `<span class="badge-tr">${l.images.length} Photo${l.images.length !== 1 ? 's' : ''}</span>`;
      const verifiedBadge = l.verified
        ? `<span class="verified-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>`
        : '';
      const bedsLabel = l.bedrooms === 0 ? 'Studio' : l.bedrooms;
      const price     = '&#8369;' + l.price.toLocaleString('en-PH');
      const priceSub  = isRent ? '<span class="prop-price-per"> / month</span>' : '';

      return `
        <div class="prop-card"
             onclick="window.location.href='listing.html?id=${l.id}'">
          <div class="prop-img-wrap">
            <img src="${l.images[0]}" alt="${l.title}" loading="lazy" />
            ${typeBadge}
            ${photoBadge}
          </div>
          <div class="prop-body">
            <div class="prop-title">${l.title}${verifiedBadge}</div>
            <div class="prop-address">${iconPin} ${l.address}</div>
            <div class="prop-amenities">
              <span class="amenity">${iconBed} ${bedsLabel}</span>
              <span class="amenity">${iconBath} ${l.bathrooms}</span>
              <span class="amenity">${iconArea} ${l.floorArea} sqm</span>
            </div>
            <div class="prop-footer">
              <div class="prop-price">${price}${priceSub}</div>
              ${l.negotiable ? `<span class="badge-negotiable">Negotiable</span>` : ''}
            </div>
          </div>
        </div>`;
    }).join('');

    container.appendChild(grid);
  }
</script>
</body>
</html>
