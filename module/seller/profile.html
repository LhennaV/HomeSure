<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeSure – My Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../assets/css/seller/seller-profile.css" />
</head>
<body>
<div class="layout">
  <div id="hs-sidebar"></div>

  <div class="main">
    <div id="hs-topbar"></div>

    <div class="content">

      <!-- Profile Card -->
      <div class="profile-card" id="profileCard">
        <div class="avatar" id="profileAvatar"></div>
        <div class="profile-info">
          <div class="profile-name" id="profileName"></div>
          <div class="profile-meta" id="profileMeta"></div>
        </div>
        <div id="statusBadge"></div>
      </div>

      <!-- Listings Section -->
      <div class="section-header">
        <div class="section-title" id="sectionTitle"></div>
        <div class="section-sub" id="sectionSub"></div>
      </div>

      <div id="listingsContainer"></div>

    </div>
  </div>
</div>

<script src="../../assets/js/fake-data.js"></script>
<script src="../../components/sidebar.js"></script>
<script src="../../components/topbar.js"></script>
<script src="../../assets/js/seller/seller-profile.js"></script>
</body>
</html>
