<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="../../assets/img/image.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeSure – My Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../assets/css/seller/seller-profile.css" />
</head>
<body>
<div class="layout">
  <div id="hs-sidebar"></div>

  <div class="main">
    <div id="hs-topbar"></div>

    <div class="content">

      <!-- Profile Card -->
      <div class="profile-card" id="profileCard">
        <div class="avatar-wrap-seller">
          <div class="avatar" id="profileAvatar"></div>
          <div class="avatar-edit-btn" id="avatarEditBtn" title="Change photo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </div>
          <input type="file" id="avatarInput" accept="image/*" style="display:none" />
        </div>
        <div class="profile-info">
          <div class="profile-name" id="profileName"></div>
          <div class="profile-meta" id="profileMeta"></div>
        </div>
        <div id="statusBadge"></div>
      </div>

      <!-- Listings Section -->
      <div class="section-header">
        <div class="section-title" id="sectionTitle"></div>
        <div class="section-sub" id="sectionSub"></div>
      </div>

      <div id="listingsContainer"></div>

    </div>
  </div>
</div>

<script src="../../assets/js/fake-data.js"></script>
<script src="../../components/sidebar.js"></script>
<script src="../../components/topbar.js"></script>
<script src="../../assets/js/seller/seller-profile.js"></script>
</body>
</html>
