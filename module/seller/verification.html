<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeSure – Identity Verification</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1E293B; --card: #253347; --card2: #2c3d55; --border: rgba(255,255,255,0.07);
      --teal: #00c9a7; --teal-faint: rgba(0,201,167,0.12); --teal-mid: rgba(0,201,167,0.25);
      --text: #f1f5f9; --muted: rgba(255,255,255,0.4); --muted2: rgba(255,255,255,0.65);
      --danger: #f87171; --radius: 14px;
    }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
    .layout { display: flex; height: 100vh; }
    .main   { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .content { flex: 1; overflow-y: auto; padding: 26px 30px 60px; }
    .content::-webkit-scrollbar { width: 5px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #1fc8b4, #0a5e53); border-radius: 99px; }
    .content::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #24e0ca, #1a9e8f); }

    /* ── Page header ── */
    .page-header { margin-bottom: 22px; }
    .page-title  { font-size: 22px; font-weight: 800; }
    .page-sub    { font-size: 12.5px; color: var(--muted); margin-top: 3px; }

    /* ── Verification column ── */
    .verify-col { display: flex; flex-direction: column; gap: 18px; }

    /* ── Banner card ── */
    .banner-card {
      display: flex; align-items: center; gap: 18px;
      padding: 20px 22px;
      background: linear-gradient(135deg, var(--teal-faint) 0%, rgba(0,201,167,0.06) 100%);
      border: 1px solid var(--teal-mid);
      border-radius: var(--radius);
    }
    .banner-icon {
      width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
      background: var(--teal-mid);
      display: flex; align-items: center; justify-content: center;
    }
    .banner-icon svg { width: 22px; height: 22px; color: var(--teal); }
    .banner-title { font-size: 15px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
    .banner-desc  { font-size: 12.5px; color: var(--muted2); line-height: 1.55; }

    /* ── Verified state banner ── */
    .verified-card {
      display: flex; align-items: center; gap: 18px;
      padding: 26px 24px;
      background: linear-gradient(135deg, var(--teal-faint) 0%, rgba(0,201,167,0.06) 100%);
      border: 1px solid var(--teal-mid);
      border-radius: var(--radius);
    }
    .verified-icon-wrap {
      width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0;
      background: var(--teal-mid);
      display: flex; align-items: center; justify-content: center;
    }
    .verified-icon-wrap svg { width: 26px; height: 26px; color: var(--teal); }
    .verified-title { font-size: 17px; font-weight: 800; color: var(--teal); margin-bottom: 5px; }
    .verified-desc  { font-size: 13px; color: var(--muted2); line-height: 1.55; }

    /* ── Section card ── */
    .section-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .section-header {
      padding: 16px 22px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 11px;
    }
    .section-icon {
      width: 34px; height: 34px; border-radius: 9px;
      background: var(--teal-faint); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .section-icon svg { width: 15px; height: 15px; color: var(--teal); }
    .section-title { font-size: 14px; font-weight: 800; }
    .section-sub   { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

    /* ── Upload areas ── */
    .upload-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 16px; padding: 20px 22px 0;
    }
    @media (max-width: 640px) { .upload-grid { grid-template-columns: 1fr; } }

    .upload-label { font-size: 11.5px; font-weight: 700; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }

    .upload-box {
      border: 1.5px dashed rgba(255,255,255,0.18);
      border-radius: 11px;
      padding: 22px 16px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
      cursor: pointer; text-align: center;
      background: rgba(255,255,255,0.02);
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-box:hover { border-color: var(--teal-mid); background: var(--teal-faint); }
    .upload-box.has-file { border-color: var(--teal-mid); background: var(--teal-faint); }

    .upload-box-icon {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--card2); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .upload-box.has-file .upload-box-icon { background: var(--teal-mid); }
    .upload-box-icon svg { width: 17px; height: 17px; color: var(--muted); }
    .upload-box.has-file .upload-box-icon svg { color: var(--teal); }

    .upload-filename { font-size: 13px; font-weight: 600; color: var(--muted2); }
    .upload-box.has-file .upload-filename { color: var(--teal); }
    .upload-filesub  { font-size: 11px; color: var(--muted); line-height: 1.5; }

    input[type="file"] { display: none; }

    /* ── Tips box ── */
    .tips-box {
      margin: 16px 22px 20px;
      border-left: 3px solid var(--teal);
      background: var(--teal-faint);
      border-radius: 0 9px 9px 0;
      padding: 14px 16px;
      display: flex; gap: 12px; align-items: flex-start;
    }
    .tips-icon { flex-shrink: 0; margin-top: 1px; }
    .tips-icon svg { width: 15px; height: 15px; color: var(--teal); display: block; }
    .tips-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .tips-list li { font-size: 12.5px; color: var(--muted2); line-height: 1.5; padding-left: 14px; position: relative; }
    .tips-list li::before { content: '•'; position: absolute; left: 0; color: var(--teal); font-weight: 700; }

    /* ── Submit button ── */
    .submit-wrap { padding: 0 22px 22px; }
    .btn-primary {
      width: 100%; padding: 13px 24px;
      background: #00c9a7;
      border: none; border-radius: 10px;
      color: #06201a; font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(12px);
      background: var(--card2); border: 1px solid var(--teal-mid);
      border-radius: 12px; padding: 13px 20px;
      display: flex; align-items: center; gap: 11px;
      font-size: 13px; font-weight: 600; color: var(--text);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 9999; white-space: nowrap; max-width: calc(100vw - 40px);
      white-space: normal; text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast-icon { flex-shrink: 0; }
    .toast-icon svg { width: 16px; height: 16px; color: var(--teal); display: block; }

    /* ── Light mode ── */
    [data-theme="light"] {
      --bg: #f1f5f9; --card: #ffffff; --card2: #f8fafc; --border: rgba(0,0,0,0.09);
      --text: #1e293b; --muted: rgba(0,0,0,0.45); --muted2: rgba(0,0,0,0.6);
    }
    [data-theme="light"] body { background: var(--bg); }
    [data-theme="light"] .upload-box { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.15); }
    [data-theme="light"] .upload-box:hover { background: var(--teal-faint); }
    [data-theme="light"] .upload-box.has-file { background: var(--teal-faint); }
    [data-theme="light"] .upload-box-icon { background: #f1f5f9; }
    [data-theme="light"] .toast { box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    [data-theme="light"] .btn-primary {
      background: #00c9a7;
    }
    [data-theme="light"] .content::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #1fc8b4, #0a5e53); }
  </style>
</head>
<body>
<div class="layout">
  <div id="hs-sidebar"></div>
  <div class="main">
    <div id="hs-topbar"></div>
    <div class="content">

      <div class="page-header">
        <div class="page-title">Identity Verification</div>
        <div class="page-sub">Verify your identity to publish listings and build trust with buyers</div>
      </div>

      <div class="verify-col" id="verifyCol">
        <!-- Content injected by JS -->
      </div>

    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span class="toast-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </span>
  <span id="toastMsg"></span>
</div>

<script src="../../assets/js/fake-data.js"></script>
<script src="../../components/sidebar.js"></script>
<script src="../../components/topbar.js"></script>
<script>
  const user = getSession();
  if (!user || user.role !== 'seller') window.location.href = '../../auth/signin.html';

  HomeSureSidebar.init({ activePage: 'settings' });
  HomeSureTopbar.init({ placeholder: 'Identity Verification' });

  const fullUser   = FAKE_USERS.find(u => u.id === user.id);
  const isVerified = fullUser && fullUser.accountStatus === 'verified';

  const col = document.getElementById('verifyCol');

  if (isVerified) {
    // ── Already Verified state ──────────────────────────────────────────────
    col.innerHTML = `
      <div class="verified-card">
        <div class="verified-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <div>
          <div class="verified-title">Already Verified</div>
          <div class="verified-desc">Your identity has been verified. You can now publish listings and operate as a trusted seller on HomeSure.</div>
        </div>
      </div>
    `;
  } else {
    // ── Upload form ─────────────────────────────────────────────────────────
    col.innerHTML = `
      <!-- Verification Required banner -->
      <div class="banner-card">
        <div class="banner-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <div>
          <div class="banner-title">Verification Required</div>
          <div class="banner-desc">Please submit your identity documents to start selling on HomeSure. This helps build trust and ensures a safe marketplace for all users.</div>
        </div>
      </div>

      <!-- Submit Documents card -->
      <div class="section-card">
        <div class="section-header">
          <div class="section-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="12" y1="18" x2="12" y2="12"/>
              <line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
          </div>
          <div>
            <div class="section-title">Submit Documents</div>
            <div class="section-sub">Upload clear photos of your government-issued ID and a selfie</div>
          </div>
        </div>

        <!-- Upload grid -->
        <div class="upload-grid">
          <!-- Government-Issued ID -->
          <div>
            <div class="upload-label">Government-Issued ID</div>
            <div class="upload-box" id="idUploadBox" onclick="document.getElementById('idFileInput').click()">
              <div class="upload-box-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="16 16 12 12 8 16"/>
                  <line x1="12" y1="12" x2="12" y2="21"/>
                  <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
                </svg>
              </div>
              <div class="upload-filename" id="idFileName">1x1 Picture.png</div>
              <div class="upload-filesub">PNG, JPG up to 10MB &bull; Passport, Driver's License, or National ID</div>
            </div>
            <input type="file" id="idFileInput" accept="image/*" onchange="handleFileSelect('id', this)" />
          </div>

          <!-- Selfie Verification -->
          <div>
            <div class="upload-label">Selfie Verification</div>
            <div class="upload-box" id="selfieUploadBox" onclick="document.getElementById('selfieFileInput').click()">
              <div class="upload-box-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="16 16 12 12 8 16"/>
                  <line x1="12" y1="12" x2="12" y2="21"/>
                  <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
                </svg>
              </div>
              <div class="upload-filename" id="selfieFileName">Click to upload selfie</div>
              <div class="upload-filesub">PNG, JPG up to 10MB &bull; Hold your ID next to your face</div>
            </div>
            <input type="file" id="selfieFileInput" accept="image/*" onchange="handleFileSelect('selfie', this)" />
          </div>
        </div>

        <!-- Verification Tips -->
        <div class="tips-box">
          <span class="tips-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </span>
          <ul class="tips-list">
            <li>Ensure your ID is clearly visible and not blurred</li>
            <li>Take the selfie in good lighting conditions</li>
            <li>Make sure your face and ID are both clearly visible</li>
            <li>Documents will be securely stored and only used for verification</li>
          </ul>
        </div>

        <!-- Submit button -->
        <div class="submit-wrap">
          <button class="btn-primary" id="submitBtn" onclick="submitVerification()">Submit for Verification</button>
        </div>
      </div>
    `;
  }

  // ── File select handler ─────────────────────────────────────────────────────
  function handleFileSelect(type, input) {
    if (!input.files || !input.files[0]) return;
    const file = input.files[0];
    const name = file.name.length > 30 ? file.name.substring(0, 27) + '...' : file.name;
    if (type === 'id') {
      document.getElementById('idFileName').textContent = name;
      document.getElementById('idUploadBox').classList.add('has-file');
    } else {
      document.getElementById('selfieFileName').textContent = name;
      document.getElementById('selfieUploadBox').classList.add('has-file');
    }
  }

  // ── Submit handler ──────────────────────────────────────────────────────────
  function submitVerification() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    showToast("Documents submitted! We'll review and notify you within 1-2 business days.");
  }

  // ── Toast ───────────────────────────────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    toast.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 5000);
  }
</script>
</body>
</html>
