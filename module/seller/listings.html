<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeSure – My Listings</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1E293B;
      --card: #253347;
      --card2: #2c3d55;
      --border: rgba(255,255,255,0.07);
      --teal: #00c9a7;
      --teal-faint: rgba(0,201,167,0.12);
      --teal-mid: rgba(0,201,167,0.25);
      --text: #f1f5f9;
      --muted: rgba(255,255,255,0.4);
      --muted2: rgba(255,255,255,0.65);
      --danger: #f87171;
      --radius: 14px;
    }

    [data-theme="light"] {
      --bg: #f1f5f9;
      --card: #ffffff;
      --card2: #f8fafc;
      --border: rgba(0,0,0,0.09);
      --text: #1e293b;
      --muted: rgba(0,0,0,0.45);
      --muted2: rgba(0,0,0,0.6);
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      transition: background 0.25s, color 0.25s;
    }

    .layout { display: flex; height: 100vh; }
    .main   { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 22px 26px 32px;
    }
    .content::-webkit-scrollbar { width: 5px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #1fc8b4, #0a5e53);
      border-radius: 99px;
    }
    .content::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #24e0ca, #1a9e8f);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Page header row ── */
    .page-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      animation: fadeUp 0.35s ease both;
    }
    .page-title { font-size: 22px; font-weight: 800; color: var(--text); }
    .page-sub   { font-size: 12.5px; color: var(--muted); margin-top: 3px; }

    .btn-add-listing {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: var(--teal);
      color: #ffffff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s, opacity 0.2s;
      flex-shrink: 0;
    }
    .btn-add-listing svg { width: 15px; height: 15px; flex-shrink: 0; }
    .btn-add-listing:hover { background: #00b896; transform: translateY(-1px); }
    .btn-add-listing:active { transform: translateY(0); }
    .btn-add-listing.disabled {
      opacity: 0.45;
      pointer-events: none;
      cursor: not-allowed;
    }

    /* ── Verification banner ── */
    .verify-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(251,191,36,0.1);
      border: 1px solid rgba(251,191,36,0.35);
      border-radius: 10px;
      padding: 13px 16px;
      margin-bottom: 20px;
      animation: fadeUp 0.4s ease 0.05s both;
    }
    .verify-banner-icon { flex-shrink: 0; }
    .verify-banner-icon svg { width: 18px; height: 18px; color: #fbbf24; display: block; }
    .verify-banner-text {
      flex: 1;
      font-size: 13px;
      color: #fbbf24;
      font-weight: 500;
      line-height: 1.45;
    }
    .verify-banner-link {
      flex-shrink: 0;
      padding: 7px 14px;
      background: rgba(251,191,36,0.15);
      border: 1px solid rgba(251,191,36,0.4);
      border-radius: 8px;
      color: #fbbf24;
      font-size: 12.5px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.2s, border-color 0.2s;
    }
    .verify-banner-link:hover {
      background: rgba(251,191,36,0.25);
      border-color: rgba(251,191,36,0.6);
    }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 22px;
      animation: fadeUp 0.4s ease 0.08s both;
    }
    .tab-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      color: var(--muted2);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--teal);
      border-bottom-color: var(--teal);
      font-weight: 700;
    }
    .tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      background: var(--card2);
      color: var(--muted2);
      transition: background 0.2s, color 0.2s;
    }
    .tab-btn.active .tab-count {
      background: var(--teal-faint);
      color: var(--teal);
    }

    /* ── Listings grid ── */
    .listings-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      animation: fadeUp 0.45s ease 0.1s both;
    }

    /* ── Listing card ── */
    .listing-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: stretch;
      overflow: hidden;
      transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
      position: relative;
    }
    .listing-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.25);
      border-color: rgba(255,255,255,0.13);
    }
    [data-theme="light"] .listing-card:hover {
      box-shadow: 0 8px 28px rgba(0,0,0,0.09);
      border-color: rgba(0,0,0,0.14);
    }

    .listing-thumb {
      width: 90px;
      min-width: 90px;
      background: var(--card2);
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
    }
    .listing-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }
    .listing-card:hover .listing-thumb img { transform: scale(1.06); }
    .listing-thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }
    .listing-thumb-placeholder svg { width: 28px; height: 28px; }

    .listing-body {
      flex: 1;
      padding: 13px 14px;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .listing-title-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      justify-content: space-between;
    }
    .listing-title {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .listing-badges {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge-rent  { background: rgba(99,102,241,0.15); color: #818cf8; }
    .badge-sale  { background: rgba(234,179,8,0.12);  color: #ca8a04; }
    [data-theme="light"] .badge-sale { color: #a16207; }

    .badge-status-approved { background: var(--teal-faint); color: var(--teal); }
    .badge-status-pending  { background: rgba(251,191,36,0.12); color: #fbbf24; }
    .badge-status-rejected { background: rgba(248,113,113,0.12); color: var(--danger); }

    .listing-price {
      font-size: 15px;
      font-weight: 800;
      color: var(--teal);
    }
    .listing-price-suffix {
      font-size: 11.5px;
      font-weight: 500;
      color: var(--muted);
      margin-left: 2px;
    }

    .listing-meta {
      font-size: 11.5px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .listing-meta svg { width: 12px; height: 12px; flex-shrink: 0; }

    .listing-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
    }
    .listing-date {
      font-size: 11px;
      color: var(--muted);
    }
    .listing-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .icon-btn {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--muted2);
      transition: background 0.18s, color 0.18s, border-color 0.18s;
    }
    .icon-btn svg { width: 14px; height: 14px; }
    .icon-btn:hover { background: var(--card2); color: var(--text); border-color: rgba(255,255,255,0.15); }
    .icon-btn.delete:hover { background: rgba(248,113,113,0.12); color: var(--danger); border-color: rgba(248,113,113,0.3); }
    [data-theme="light"] .icon-btn:hover { border-color: rgba(0,0,0,0.15); }

    /* Rejection reason chip */
    .rejection-note {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 11.5px;
      color: #fca5a5;
      line-height: 1.4;
      margin-top: 2px;
    }
    .rejection-note svg { width: 13px; height: 13px; flex-shrink: 0; margin-top: 1px; color: var(--danger); }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 60px 24px;
      text-align: center;
      animation: fadeUp 0.45s ease both;
    }
    .empty-icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: var(--teal-faint);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .empty-icon svg { width: 30px; height: 30px; color: var(--teal); }
    .empty-title { font-size: 16px; font-weight: 800; color: var(--text); }
    .empty-sub   { font-size: 13px; color: var(--muted); max-width: 280px; line-height: 1.5; }
    .btn-empty-action {
      margin-top: 4px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--teal);
      color: #ffffff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-empty-action:hover { background: #00b896; transform: translateY(-1px); }
    .btn-empty-action.secondary {
      background: var(--card2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-empty-action.secondary:hover { background: var(--card); }

    /* ── Delete confirmation modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 380px;
      transform: scale(0.96) translateY(8px);
      transition: transform 0.22s ease;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .modal-overlay.open .modal-box { transform: scale(1) translateY(0); }
    .modal-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: rgba(248,113,113,0.12);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
    }
    .modal-icon svg { width: 20px; height: 20px; color: var(--danger); }
    .modal-title { font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    .modal-desc  { font-size: 13px; color: var(--muted2); line-height: 1.55; margin-bottom: 22px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel {
      padding: 9px 18px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--muted2);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
    }
    .btn-cancel:hover { background: var(--card); color: var(--text); }
    .btn-delete-confirm {
      padding: 9px 18px;
      background: var(--danger);
      border: none;
      border-radius: 9px;
      color: #ffffff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s, transform 0.15s;
    }
    .btn-delete-confirm:hover { background: #f05252; transform: translateY(-1px); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px; right: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 18px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
      z-index: 99999;
      transform: translateY(20px);
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .toast-dot.success { background: var(--teal); }
    .toast-dot.danger  { background: var(--danger); }

    /* Light mode extras */
    [data-theme="light"] .modal-box { box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
    [data-theme="light"] .listing-card:hover { box-shadow: 0 8px 28px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

<div class="layout">
  <div id="hs-sidebar"></div>
  <div class="main">
    <div id="hs-topbar"></div>
    <div class="content" id="pageContent">

      <!-- Page header row -->
      <div class="page-header-row">
        <div>
          <div class="page-title">My Listings</div>
          <div class="page-sub">Manage your posted properties</div>
        </div>
        <button class="btn-add-listing" id="btnAddListing" onclick="window.location.href='post.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Add New Listing
        </button>
      </div>

      <!-- Verification warning banner (conditionally shown) -->
      <div class="verify-banner" id="verifyBanner" style="display:none;">
        <div class="verify-banner-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <div class="verify-banner-text">
          You must be verified to publish listings. Please complete verification first.
        </div>
        <a class="verify-banner-link" href="verification.html">Complete Verification</a>
      </div>

      <!-- Tab bar -->
      <div class="tab-bar" id="tabBar">
        <button class="tab-btn active" data-tab="approved">
          Active <span class="tab-count" id="countApproved">0</span>
        </button>
        <button class="tab-btn" data-tab="pending">
          Draft <span class="tab-count" id="countPending">0</span>
        </button>
        <button class="tab-btn" data-tab="rejected">
          Closed <span class="tab-count" id="countRejected">0</span>
        </button>
      </div>

      <!-- Listings grid -->
      <div class="listings-grid" id="listingsGrid"></div>

    </div><!-- .content -->
  </div><!-- .main -->
</div><!-- .layout -->

<!-- Delete confirmation modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal-box">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
    </div>
    <div class="modal-title">Delete Listing</div>
    <div class="modal-desc" id="deleteModalDesc">
      Are you sure you want to delete this listing? This action cannot be undone and the listing will be permanently removed.
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancelDelete">Cancel</button>
      <button class="btn-delete-confirm" id="btnConfirmDelete">Delete Listing</button>
    </div>
  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast">
  <span class="toast-dot success" id="toastDot"></span>
  <span id="toastMsg">Done.</span>
</div>

<script src="../../assets/js/fake-data.js"></script>
<script src="../../components/sidebar.js"></script>
<script src="../../components/topbar.js"></script>
<script>
  // ── Auth guard ────────────────────────────────────────────────────────────────
  const session = getSession();
  if (!session || session.role !== 'seller') {
    window.location.href = '../../auth/signin.html';
  }

  // ── Init components ───────────────────────────────────────────────────────────
  HomeSureSidebar.init({ activePage: 'listings' });
  HomeSureTopbar.init({ placeholder: 'Search your listings...' });

  // ── Data setup ────────────────────────────────────────────────────────────────
  const fullUser = FAKE_USERS.find(u => u.id === session.id) || {};
  const isVerified = fullUser.accountStatus === 'verified';

  // All listings belonging to this seller (from FAKE_LISTINGS, not from user.listings array which may differ)
  let myListings = FAKE_LISTINGS.filter(l => l.sellerId === session.id);

  // Counts per status
  function getByStatus(status) {
    return myListings.filter(l => l.status === status);
  }

  // ── State ─────────────────────────────────────────────────────────────────────
  let activeTab = 'approved';
  let pendingDeleteId = null;

  // ── Verification banner ───────────────────────────────────────────────────────
  if (!isVerified) {
    document.getElementById('verifyBanner').style.display = 'flex';
    const btn = document.getElementById('btnAddListing');
    btn.classList.add('disabled');
    btn.removeAttribute('onclick');
    btn.title = 'Complete verification to post listings';
  }

  // ── Tab counts ────────────────────────────────────────────────────────────────
  function updateCounts() {
    document.getElementById('countApproved').textContent = getByStatus('approved').length;
    document.getElementById('countPending').textContent  = getByStatus('pending').length;
    document.getElementById('countRejected').textContent = getByStatus('rejected').length;
  }
  updateCounts();

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function formatPrice(price, listingFor) {
    if (listingFor === 'rent') {
      return '₱' + price.toLocaleString() + '<span class="listing-price-suffix">/mo</span>';
    }
    if (price >= 1000000) {
      return '₱' + (price / 1000000).toFixed(price % 1000000 === 0 ? 0 : 1) + 'M';
    }
    return '₱' + price.toLocaleString();
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-PH', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function getThumbHtml(listing) {
    if (listing.images && listing.images.length > 0) {
      return `<img src="${listing.images[0]}" alt="${listing.title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=&quot;listing-thumb-placeholder&quot;>${homeSvg()}</div>'" />`;
    }
    return `<div class="listing-thumb-placeholder">${homeSvgRaw()}</div>`;
  }

  function homeSvgRaw() {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`;
  }

  function statusBadgeHtml(status) {
    const map = {
      approved: { cls: 'badge-status-approved', label: 'Active' },
      pending:  { cls: 'badge-status-pending',  label: 'Pending' },
      rejected: { cls: 'badge-status-rejected', label: 'Rejected' },
    };
    const info = map[status] || { cls: '', label: status };
    return `<span class="badge ${info.cls}">${info.label}</span>`;
  }

  function listingForBadgeHtml(listingFor) {
    if (listingFor === 'rent') return `<span class="badge badge-rent">For Rent</span>`;
    return `<span class="badge badge-sale">For Sale</span>`;
  }

  // ── Render cards ──────────────────────────────────────────────────────────────
  function renderListings() {
    const grid = document.getElementById('listingsGrid');
    const filtered = getByStatus(activeTab);

    if (filtered.length === 0) {
      grid.innerHTML = buildEmptyState();
      return;
    }

    grid.innerHTML = filtered.map(listing => buildCard(listing)).join('');

    // Bind action buttons
    grid.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', e => {
        const id = btn.dataset.edit;
        showToast('Edit feature coming soon.', 'success');
      });
    });

    grid.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', e => {
        const id = btn.dataset.delete;
        const listing = myListings.find(l => l.id === id);
        openDeleteModal(listing);
      });
    });
  }

  function buildCard(listing) {
    const rejNote = listing.status === 'rejected' && listing.rejectionReason
      ? `<div class="rejection-note">
           <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
             <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
           </svg>
           <span>${listing.rejectionReason}</span>
         </div>`
      : '';

    const bedsLabel = listing.bedrooms === 0 ? 'Studio' : listing.bedrooms + ' bed' + (listing.bedrooms > 1 ? 's' : '');
    const metaLine = `${bedsLabel} &middot; ${listing.bathrooms} bath &middot; ${listing.floorArea} m²`;

    return `
      <div class="listing-card">
        <div class="listing-thumb">
          ${getThumbHtml(listing)}
        </div>
        <div class="listing-body">
          <div class="listing-title-row">
            <div class="listing-title" title="${listing.title}">${listing.title}</div>
          </div>
          <div class="listing-badges">
            ${listingForBadgeHtml(listing.listingFor)}
            ${statusBadgeHtml(listing.status)}
            ${listing.negotiable ? '<span class="badge" style="background:rgba(99,102,241,0.1);color:#a5b4fc;">Negotiable</span>' : ''}
          </div>
          <div class="listing-price">
            ${formatPrice(listing.price, listing.listingFor)}
          </div>
          <div class="listing-meta">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
            </svg>
            <span>${listing.barangay}, Sta. Maria</span>
          </div>
          <div class="listing-meta">${metaLine}</div>
          ${rejNote}
          <div class="listing-footer">
            <span class="listing-date">Posted ${formatDate(listing.postedAt)}</span>
            <div class="listing-actions">
              <button class="icon-btn" data-edit="${listing.id}" title="Edit listing">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              <button class="icon-btn delete" data-delete="${listing.id}" title="Delete listing">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6"/><path d="M14 11v6"/>
                  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>`;
  }

  function buildEmptyState() {
    if (activeTab === 'approved') {
      const actionBtn = isVerified
        ? `<a class="btn-empty-action" href="post.html">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;">
               <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
             </svg>
             Post your first property
           </a>`
        : `<a class="btn-empty-action secondary" href="verification.html">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;">
               <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
             </svg>
             Verify your account to start posting
           </a>`;
      return `
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </div>
          <div class="empty-title">No active listings yet.</div>
          <div class="empty-sub">Your approved properties will appear here once published.</div>
          ${actionBtn}
        </div>`;
    }

    if (activeTab === 'pending') {
      return `
        <div class="empty-state">
          <div class="empty-icon" style="background:rgba(251,191,36,0.12);">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          <div class="empty-title">No pending listings.</div>
          <div class="empty-sub">Listings awaiting admin review will show up here.</div>
        </div>`;
    }

    if (activeTab === 'rejected') {
      return `
        <div class="empty-state">
          <div class="empty-icon" style="background:rgba(248,113,113,0.12);">
            <svg viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
          </div>
          <div class="empty-title">No rejected listings.</div>
          <div class="empty-sub">Listings that were not approved will appear here.</div>
        </div>`;
    }

    return '';
  }

  // ── Tab switching ─────────────────────────────────────────────────────────────
  document.getElementById('tabBar').addEventListener('click', e => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    renderListings();
  });

  // ── Delete modal ──────────────────────────────────────────────────────────────
  function openDeleteModal(listing) {
    if (!listing) return;
    pendingDeleteId = listing.id;
    document.getElementById('deleteModalDesc').textContent =
      `Are you sure you want to delete "${listing.title}"? This action cannot be undone and the listing will be permanently removed.`;
    document.getElementById('deleteModal').classList.add('open');
  }

  document.getElementById('btnCancelDelete').addEventListener('click', () => {
    document.getElementById('deleteModal').classList.remove('open');
    pendingDeleteId = null;
  });

  document.getElementById('deleteModal').addEventListener('click', e => {
    if (e.target === document.getElementById('deleteModal')) {
      document.getElementById('deleteModal').classList.remove('open');
      pendingDeleteId = null;
    }
  });

  document.getElementById('btnConfirmDelete').addEventListener('click', () => {
    if (!pendingDeleteId) return;
    // Remove from fake data array (in-memory only)
    myListings = myListings.filter(l => l.id !== pendingDeleteId);
    // Also remove from FAKE_LISTINGS in memory
    const idx = FAKE_LISTINGS.findIndex(l => l.id === pendingDeleteId);
    if (idx !== -1) FAKE_LISTINGS.splice(idx, 1);

    document.getElementById('deleteModal').classList.remove('open');
    pendingDeleteId = null;

    updateCounts();
    renderListings();
    showToast('Listing deleted successfully.', 'danger');
  });

  // ── Toast ─────────────────────────────────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg, type = 'success') {
    const toast = document.getElementById('toast');
    const dot   = document.getElementById('toastDot');
    const msgEl = document.getElementById('toastMsg');

    msgEl.textContent = msg;
    dot.className = 'toast-dot ' + type;

    toast.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ── Topbar search filter ───────────────────────────────────────────────────────
  const searchInput = document.getElementById('hsSearch');
  if (searchInput) {
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      const allListings = FAKE_LISTINGS.filter(l => l.sellerId === session.id);
      myListings = q
        ? allListings.filter(l =>
            l.title.toLowerCase().includes(q) ||
            l.barangay.toLowerCase().includes(q) ||
            (l.address && l.address.toLowerCase().includes(q))
          )
        : allListings;
      updateCounts();
      renderListings();
    });
  }

  // ── Initial render ────────────────────────────────────────────────────────────
  renderListings();
</script>
</body>
</html>
