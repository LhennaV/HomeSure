<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeSure – My Listings</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1E293B; --card: #253347; --card2: #2c3d55;
      --border: rgba(255,255,255,0.07);
      --teal: #00c9a7; --teal-faint: rgba(0,201,167,0.12); --teal-mid: rgba(0,201,167,0.25);
      --text: #f1f5f9; --muted: rgba(255,255,255,0.4); --muted2: rgba(255,255,255,0.65);
      --danger: #f87171; --danger-faint: rgba(248,113,113,0.1); --danger-mid: rgba(248,113,113,0.3);
      --radius: 14px;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; overflow: hidden;
    }

    .layout { display: flex; height: 100vh; }
    .main   { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .content { flex: 1; overflow-y: auto; padding: 22px 26px 32px; }
    .content::-webkit-scrollbar { width: 5px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #1fc8b4, #0a5e53); border-radius: 99px; }
    .content::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #24e0ca, #1a9e8f); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); max-height: 200px; margin-bottom: 10px; }
      to   { opacity: 0; transform: translateY(6px); max-height: 0; margin-bottom: 0; padding-top: 0; padding-bottom: 0; }
    }

    /* ── Page Header ── */
    .page-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 18px; gap: 14px;
      animation: fadeUp 0.35s ease both;
    }
    .page-title { font-size: 20px; font-weight: 800; color: var(--text); line-height: 1.2; }
    .page-sub   { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ── Add Listing Button ── */
    .btn-add {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 18px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #00c9a7 0%, #00a084 100%);
      color: #fff; font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s, box-shadow 0.2s;
      box-shadow: 0 3px 14px rgba(0,201,167,0.28); white-space: nowrap; flex-shrink: 0;
    }
    .btn-add:hover { opacity: 0.88; box-shadow: 0 4px 18px rgba(0,201,167,0.38); }
    .btn-add.disabled {
      opacity: 0.4; cursor: not-allowed; pointer-events: none;
    }
    .btn-add-icon {
      width: 18px; height: 18px; border-radius: 50%;
      background: rgba(255,255,255,0.22);
      display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .btn-add-icon svg { width: 10px; height: 10px; }

    /* ── Verification Warning Banner ── */
    .warn-banner {
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.35);
      border-radius: 10px; padding: 14px 16px; margin-bottom: 18px;
      animation: fadeUp 0.35s ease 0.05s both;
    }
    .warn-left { display: flex; align-items: center; gap: 10px; }
    .warn-left svg { width: 16px; height: 16px; color: #fbbf24; flex-shrink: 0; }
    .warn-text { font-size: 13px; color: #fbbf24; font-weight: 500; }
    .btn-verify {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: 8px; border: 1px solid rgba(251,191,36,0.45);
      background: rgba(251,191,36,0.1); color: #fbbf24;
      font-family: inherit; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: background 0.2s; white-space: nowrap; flex-shrink: 0;
    }
    .btn-verify:hover { background: rgba(251,191,36,0.18); }

    /* ── Tab Bar ── */
    .tab-bar {
      display: flex; align-items: center;
      border-bottom: 1px solid var(--border);
      margin-bottom: 18px;
      animation: fadeUp 0.35s ease 0.1s both;
    }
    .tab {
      padding: 10px 18px; font-size: 13px; font-weight: 600;
      color: var(--muted); cursor: pointer; border-bottom: 2.5px solid transparent;
      transition: color 0.18s, border-color 0.18s; margin-bottom: -1px;
      user-select: none;
    }
    .tab.active { color: var(--teal); border-bottom-color: var(--teal); }
    .tab:hover:not(.active) { color: var(--muted2); }

    /* ── Listing List ── */
    .listing-list {
      display: flex; flex-direction: column; gap: 10px;
      animation: fadeUp 0.35s ease 0.15s both;
    }

    /* ── Listing Row Card ── */
    .listing-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      transition: border-color 0.2s;
    }
    .listing-card:hover { border-color: rgba(255,255,255,0.13); }

    .listing-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
    }

    .listing-thumb {
      width: 80px; height: 80px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0;
      background: var(--card2);
    }

    .listing-info { flex: 1; min-width: 0; }
    .listing-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
    .listing-title { font-size: 13.5px; font-weight: 700; color: var(--text); }

    .pill {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 20px;
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.03em;
    }
    .pill-rent { background: var(--teal-faint); color: var(--teal); border: 1px solid var(--teal-mid); }
    .pill-sale { background: rgba(99,102,241,0.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.25); }

    .listing-address { font-size: 12px; color: var(--muted); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .listing-price   { font-size: 14px; font-weight: 800; color: var(--teal); }
    .listing-posted  { font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* ── Right Actions ── */
    .listing-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; flex-shrink: 0; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
    }
    .status-badge.approved { background: var(--teal-faint); color: var(--teal); border: 1px solid var(--teal-mid); }
    .status-badge.pending  { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    .status-badge.rejected { background: var(--danger-faint); color: var(--danger); border: 1px solid var(--danger-mid); }

    .status-dot {
      width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0;
    }

    .action-btns { display: flex; align-items: center; gap: 6px; }

    .btn-edit {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 11px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted2); font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: border-color 0.18s, color 0.18s, background 0.18s;
    }
    .btn-edit:hover { border-color: rgba(255,255,255,0.2); color: var(--text); background: rgba(255,255,255,0.04); }
    .btn-edit svg { width: 12px; height: 12px; }

    .btn-delete {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 11px; border-radius: 8px;
      border: 1px solid var(--danger-mid); background: var(--danger-faint);
      color: var(--danger); font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background 0.18s, border-color 0.18s;
    }
    .btn-delete:hover { background: rgba(248,113,113,0.16); border-color: rgba(248,113,113,0.45); }
    .btn-delete svg { width: 12px; height: 12px; }

    /* ── Inline Delete Confirm ── */
    .delete-confirm {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-top: 1px solid var(--border);
      background: rgba(248,113,113,0.05);
      animation: fadeUp 0.2s ease both;
    }
    .delete-confirm-text { font-size: 12.5px; color: var(--danger); font-weight: 600; flex: 1; }
    .btn-confirm-delete {
      padding: 5px 13px; border-radius: 8px;
      border: 1px solid var(--danger-mid); background: var(--danger-faint);
      color: var(--danger); font-family: inherit; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: background 0.18s;
    }
    .btn-confirm-delete:hover { background: rgba(248,113,113,0.2); }
    .btn-cancel-delete {
      padding: 5px 13px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted2); font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background 0.18s, border-color 0.18s;
    }
    .btn-cancel-delete:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.18); }

    /* ── Empty State ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 24px; gap: 14px; text-align: center;
      animation: fadeUp 0.35s ease 0.15s both;
    }
    .empty-icon {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--card2); display: flex; align-items: center; justify-content: center;
      margin-bottom: 4px;
    }
    .empty-icon svg { width: 24px; height: 24px; color: var(--muted); }
    .empty-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .empty-sub   { font-size: 13px; color: var(--muted); max-width: 280px; }
    .btn-empty-add {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #00c9a7 0%, #00a084 100%);
      color: #fff; font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s; margin-top: 4px;
      box-shadow: 0 3px 14px rgba(0,201,167,0.28);
    }
    .btn-empty-add:hover { opacity: 0.88; }

    /* ── Removing animation ── */
    .listing-card.removing {
      animation: fadeOut 0.35s ease forwards;
      overflow: hidden; pointer-events: none;
    }

    /* ── Light Mode ── */
    [data-theme="light"] {
      --bg: #f1f5f9; --card: #ffffff; --card2: #f8fafc;
      --border: rgba(0,0,0,0.09);
      --text: #1e293b; --muted: rgba(0,0,0,0.45); --muted2: rgba(0,0,0,0.6);
    }
    [data-theme="light"] body { background: var(--bg); }
    [data-theme="light"] .listing-card:hover { border-color: rgba(0,0,0,0.15); }
    [data-theme="light"] .btn-edit:hover { background: rgba(0,0,0,0.04); }
    [data-theme="light"] .btn-add {
      background: linear-gradient(135deg, #00c9a7 0%, rgba(0,130,106,0.85) 100%);
    }
    [data-theme="light"] .btn-empty-add {
      background: linear-gradient(135deg, #00c9a7 0%, rgba(0,130,106,0.85) 100%);
    }
    [data-theme="light"] .content::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #1fc8b4, #0a5e53);
    }
    [data-theme="light"] .delete-confirm { background: rgba(248,113,113,0.04); }
    [data-theme="light"] .empty-icon { background: #f1f5f9; }
    [data-theme="light"] .pill-sale { background: rgba(99,102,241,0.08); color: #6366f1; border-color: rgba(99,102,241,0.2); }
  </style>
</head>
<body>
<div class="layout">
  <div id="hs-sidebar"></div>
  <div class="main">
    <div id="hs-topbar"></div>
    <div class="content">

      <!-- Page Header -->
      <div class="page-header">
        <div>
          <div class="page-title">My Listings</div>
          <div class="page-sub">Manage and track your property listings</div>
        </div>
        <button class="btn-add" id="addListingBtn" onclick="handleAddListing()">
          <span class="btn-add-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </span>
          Add New Listing
        </button>
      </div>

      <!-- Verification Warning Banner -->
      <div class="warn-banner" id="warnBanner" style="display:none">
        <div class="warn-left">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <span class="warn-text">You must be verified to publish listings. Please complete verification first.</span>
        </div>
        <button class="btn-verify" onclick="window.location.href='verification.html'">
          Complete Verification &rarr;
        </button>
      </div>

      <!-- Tab Bar -->
      <div class="tab-bar">
        <div class="tab active" data-tab="active" onclick="switchTab('active')">Active (<span id="countActive">0</span>)</div>
        <div class="tab" data-tab="draft" onclick="switchTab('draft')">Draft (<span id="countDraft">0</span>)</div>
        <div class="tab" data-tab="closed" onclick="switchTab('closed')">Closed (<span id="countClosed">0</span>)</div>
      </div>

      <!-- Listing Panels -->
      <div id="listActive"></div>
      <div id="listDraft"  style="display:none"></div>
      <div id="listClosed" style="display:none"></div>

    </div>
  </div>
</div>

<script src="../../assets/js/fake-data.js"></script>
<script src="../../components/sidebar.js"></script>
<script src="../../components/topbar.js"></script>
<script>
  // ── Auth guard ──────────────────────────────────────────────────────────────
  const session = getSession();
  if (!session || session.role !== 'seller') window.location.href = '../../auth/signin.html';

  HomeSureSidebar.init({ activePage: 'listings' });
  HomeSureTopbar.init({ placeholder: 'Search your listings...' });

  // ── Resolve user & listings ─────────────────────────────────────────────────
  const fullUser   = FAKE_USERS.find(u => u.id === session.id) || {};
  const isVerified = fullUser.accountStatus === 'verified';

  // Mutable copy so deletes don't touch the original array
  let myListings = FAKE_LISTINGS.filter(l => l.sellerId === session.id);

  // ── Add button & warning banner ─────────────────────────────────────────────
  if (!isVerified) {
    document.getElementById('addListingBtn').classList.add('disabled');
    document.getElementById('addListingBtn').setAttribute('title', 'Complete verification to post listings');
    document.getElementById('warnBanner').style.display = 'flex';
  }

  // ── Buckets ─────────────────────────────────────────────────────────────────
  const getActive = () => myListings.filter(l => l.status === 'approved');
  const getDraft  = () => myListings.filter(l => l.status === 'pending');
  const getClosed = () => myListings.filter(l => l.status === 'rejected');

  // ── Formatting helpers ──────────────────────────────────────────────────────
  function formatPrice(listing) {
    const v = listing.price;
    if (listing.listingFor === 'rent') return '\u20b1' + v.toLocaleString() + '/mo';
    if (v >= 1000000) return '\u20b1' + (v / 1000000).toFixed(v % 1000000 === 0 ? 0 : 1) + 'M';
    if (v >= 1000)    return '\u20b1' + Math.round(v / 1000) + 'K';
    return '\u20b1' + v.toLocaleString();
  }

  function formatDate(str) {
    if (!str) return '';
    return new Date(str).toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  // ── Build card HTML ─────────────────────────────────────────────────────────
  function buildCard(listing) {
    const thumb = (listing.images && listing.images[0])
      ? listing.images[0]
      : 'https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=400';

    const pillCls   = listing.listingFor === 'rent' ? 'pill-rent' : 'pill-sale';
    const pillLabel = listing.listingFor === 'rent' ? 'For Rent' : 'For Sale';

    const statusCls   = { approved: 'approved', pending: 'pending', rejected: 'rejected' }[listing.status] || 'pending';
    const statusLabel = { approved: 'Approved',  pending: 'Pending',  rejected: 'Rejected'  }[listing.status] || listing.status;

    return `
      <div class="listing-card" id="card-${listing.id}">
        <div class="listing-row">
          <img class="listing-thumb" src="${thumb}" alt="${listing.title}" loading="lazy"
               onerror="this.src='https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=400'" />
          <div class="listing-info">
            <div class="listing-title-row">
              <span class="listing-title">${listing.title}</span>
              <span class="pill ${pillCls}">${pillLabel}</span>
            </div>
            <div class="listing-address">${listing.address}</div>
            <div class="listing-price">${formatPrice(listing)}</div>
            <div class="listing-posted">Posted ${formatDate(listing.postedAt)}</div>
          </div>
          <div class="listing-actions">
            <span class="status-badge ${statusCls}">
              <span class="status-dot"></span>${statusLabel}
            </span>
            <div class="action-btns">
              <button class="btn-edit" onclick="handleEdit('${listing.id}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
                Edit
              </button>
              <button class="btn-delete" onclick="promptDelete('${listing.id}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6"/><path d="M14 11v6"/>
                  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
                Delete
              </button>
            </div>
          </div>
        </div>
        <div class="delete-confirm" id="confirm-${listing.id}" style="display:none">
          <span class="delete-confirm-text">Are you sure? This cannot be undone.</span>
          <button class="btn-confirm-delete" onclick="confirmDelete('${listing.id}')">Confirm</button>
          <button class="btn-cancel-delete"  onclick="cancelDelete('${listing.id}')">Cancel</button>
        </div>
      </div>`;
  }

  // ── Empty state HTML ────────────────────────────────────────────────────────
  function buildEmpty(tab) {
    if (tab === 'active') {
      const cta = isVerified
        ? `<button class="btn-empty-add" onclick="handleAddListing()">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
               <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
             </svg>
             Add your first listing
           </button>`
        : `<span style="font-size:13px;color:var(--muted)">Verify your account to start posting</span>`;
      return `<div class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
            <polyline points="9 21 9 12 15 12 15 21"/>
          </svg>
        </div>
        <div class="empty-title">No active listings</div>
        <div class="empty-sub">Your approved listings will appear here once published.</div>
        ${cta}
      </div>`;
    }
    if (tab === 'draft') {
      return `<div class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <div class="empty-title">No listings pending review</div>
        <div class="empty-sub">Listings submitted for review will show up here while awaiting approval.</div>
      </div>`;
    }
    return `<div class="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <div class="empty-title">No rejected listings</div>
      <div class="empty-sub">Listings that were rejected by admins will appear here.</div>
    </div>`;
  }

  // ── Render a panel ──────────────────────────────────────────────────────────
  function renderPanel(tab, listings, containerId) {
    const el = document.getElementById(containerId);
    if (listings.length === 0) {
      el.innerHTML = buildEmpty(tab);
    } else {
      el.innerHTML = `<div class="listing-list">${listings.map(buildCard).join('')}</div>`;
    }
  }

  // ── Update counts in tabs ───────────────────────────────────────────────────
  function updateCounts() {
    document.getElementById('countActive').textContent = getActive().length;
    document.getElementById('countDraft').textContent  = getDraft().length;
    document.getElementById('countClosed').textContent = getClosed().length;
  }

  // ── Initial full render ─────────────────────────────────────────────────────
  function renderAll() {
    updateCounts();
    renderPanel('active', getActive(), 'listActive');
    renderPanel('draft',  getDraft(),  'listDraft');
    renderPanel('closed', getClosed(), 'listClosed');
  }
  renderAll();

  // ── Tab switching ───────────────────────────────────────────────────────────
  let currentTab = 'active';
  function switchTab(tab) {
    if (tab === currentTab) return;
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.getElementById('listActive').style.display = tab === 'active' ? '' : 'none';
    document.getElementById('listDraft').style.display  = tab === 'draft'  ? '' : 'none';
    document.getElementById('listClosed').style.display = tab === 'closed' ? '' : 'none';
  }

  // ── Add listing ─────────────────────────────────────────────────────────────
  function handleAddListing() {
    if (!isVerified) return;
    // Wire to add-listing page when ready
    alert('Add listing — coming soon!');
  }

  // ── Edit ────────────────────────────────────────────────────────────────────
  function handleEdit(id) {
    alert('Edit listing ' + id + ' — coming soon!');
  }

  // ── Delete: prompt ──────────────────────────────────────────────────────────
  function promptDelete(id) {
    // Collapse any other open confirm rows first
    document.querySelectorAll('.delete-confirm').forEach(el => {
      if (el.id !== 'confirm-' + id) el.style.display = 'none';
    });
    const row = document.getElementById('confirm-' + id);
    if (row) row.style.display = 'flex';
  }

  function cancelDelete(id) {
    const row = document.getElementById('confirm-' + id);
    if (row) row.style.display = 'none';
  }

  // ── Delete: confirm with fade-out ───────────────────────────────────────────
  function confirmDelete(id) {
    const card = document.getElementById('card-' + id);
    if (!card) return;
    card.classList.add('removing');
    card.addEventListener('animationend', () => {
      myListings = myListings.filter(l => l.id !== id);
      updateCounts();
      const bucketMap = { active: getActive, draft: getDraft, closed: getClosed };
      const panelMap  = { active: 'listActive', draft: 'listDraft', closed: 'listClosed' };
      renderPanel(currentTab, bucketMap[currentTab](), panelMap[currentTab]);
    }, { once: true });
  }
</script>
</body>
</html>
